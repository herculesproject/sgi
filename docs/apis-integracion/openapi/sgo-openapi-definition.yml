components:
  schemas:
    AreaConocimientoOutput:
      type: object
      properties:
        id:
          type: string
          example: A1
        nombre:
          type: string
          example: Dibujo
        padreId:
          type: string
          example: null
    CentroOutput:
      type: object
      properties:
        id:
          type: string
          example: C1
        nombre:
          type: string
          example: FACULTAD DE CIENCIAS
    ClasificacionOutput:
      type: object
      properties:
        id:
          type: string
          example: C1
        nombre:
          type: string
          example: ANEP
        codigo:
          type: string
          example: CLS1
        padreId:
          type: string
          example: null
    ComunidadAutonomaOutput:
      type: object
      properties:
        id:
          type: string
          example: C1
        nombre:
          type: string
          example: PRINCIPADO DE ASTURIAS
        paisId:
          type: string
          example: P1
    DepartamentoOutput:
      type: object
      properties:
        id:
          type: string
          example: D1
        nombre:
          type: string
          example: ADMINISTRACIÓN DE ACTIVIDADES DEPORTIVAS
    PaisOutput:
      type: object
      properties:
        id:
          type: string
          example: P1
        nombre:
          type: string
          example: ESPAÑA
    ProvinciaOutput:
      type: object
      properties:
        id:
          type: string
          example: PR1
        nombre:
          type: string
          example: ASTURIAS
        comunidadAutonomaId:
          type: string
          example: C1
    UnidadVinculacionOutput:
      type: object
      properties:
        id:
          type: string
          example: UV1
        nombre:
          type: string
          example: UNIDAD1
        codigo:
          type: string
          example: UNI1
        predecesorId:
          type: string
          example: null
        activo:
          type: boolean
          example: true

    NotFoundError:
      type: object
      description: Este error se produce cuando el recurso solicitado no existe.
      required:
        - type
        - title
        - status
        - instance
      properties:
        type:
          type: string
          description: Tipo de error.
          example: urn:problem-type:not-found
        title:
          type: string
          description: Descripción del error.
          example: Not Found
        status:
          type: integer
          description: Código HTTP del error.
          example: 404
        instance:
          type: string
          description: Identificador único del error.
          example: urn:uuid:6ec423fd-87fb-4470-9c5e-60c4628bd7eb
        detail:
          type: string
          description: Información adicional del error.
          example: No se ha encontrado '{NOMBRE_RECURSO}' con el identificador '{IDENTIFICADOR_RECURSO}'
    BadRequestError:
      type: object
      description: Este error se produce cuando el sistema recibe una petición incorrecta y no existe un error más especifico.
      required:
        - type
        - title
        - status
        - instance
      properties:
        type:
          type: string
          description: Tipo de error.
          example: urn:problem-type:bad-request
        title:
          type: string
          description: Descripción del error.
          example: Bad Request
        status:
          type: integer
          description: Código HTTP del error.
          example: 400
        instance:
          type: string
          description: Identificador único del error.
          example: urn:uuid:6ec423fd-87fb-4470-9c5e-60c4628bd7eb
        detail:
          type: string
          description: Información adicional del error.
          example: Page index must not be less than zero
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT # optional, for documentation purposes only

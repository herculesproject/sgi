        razonSocial:
          type: string
          description: Razón social de la entidad.
          example: RazonSocial 1
        datosEconomicos:
          type: boolean
          description: Indicador que señala si existen datos económicos disponibles en el SGEMP.
          example: true
        padreId:
          type: string
          nullable: true
          description: Identificador de la entidad padre o entidad principal. Estará informado en el caso de entidades que son subentidad de otra.
          example: null
    EmpresaOutput:
      type: object
      description: |-
        Datos de la entidad.
      required:

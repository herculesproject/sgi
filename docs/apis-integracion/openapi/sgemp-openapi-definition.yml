        - empresas
      summary: Búsqueda rápida de entidades
      description: |-
        Versión optimizada del endpoint `GET /empresas`, diseñada para su uso en componentes de **autocompletado** (buscadores rápidos).

        Devuelve un máximo de **11 registros** (paginación fija, página 0 y ordenados alfabéticamente).  
        Si se devuelven más de 10 resultados, el SGI mostrará el mensaje:
        *“Demasiados resultados, por favor refine la búsqueda”*, indicando al usuario que existen más coincidencias.

        ### Módulos del SGI donde se utiliza
        - CSP: **Convocatoria ➜ Listado**, **Convocatoria ➜ Datos generales**, **Convocatoria ➜ Entidades ➜ Convocantes**, **Convocatoria ➜ Entidades ➜ Financiadoras**, **Solicitud ➜ Listado, **Solicitud ➜ Proyecto ➜ Entidades ➜ Financiadoras**, **Solicitud ➜ Proyecto ➜ Presupuesto por entidades ➜ Datos generales**, **Solicitud ➜ Proyecto ➜ Socio ➜ Datos generales**, **Solicitud RRHH ➜ Solicitante**, **Solicitudes Autorización ➜ Datos generales**, **Participación proyectos externos ➜ Listado notificaciones CVN**, **Participación proyectos externos ➜ Notificaciones CVN ➜ Datos generales**, **Proyecto ➜ Listado**, **Proyecto ➜ Entidades ➜ Convocantes**, **Proyecto ➜ Entidades ➜ Financiadoras**, **Proyecto ➜ Entidades ➜ Gestoras**, **Proyecto ➜ Socios ➜ Datos generales**, **Ejecución económica ➜ Listado**
        - EER: **Empresas de explotación de resultados ➜ Listado**, Empresas de explotación de resultados ➜ Datos generales**, **Empresas de explotación de resultados ➜ Equipo empresarial ➜ Composición sociedad**
        - PII: **Invención ➜ Informes de patentabilidad**, **Invención ➜ Titularidad ➜ Titular**, **Invención ➜ Solicitud protección ➜ Datos generales**

        ### Consideraciones para la implementación
        - Este servicio se utiliza desde las pantallas que incorporan el **buscador de entidades**, cuando el usuario escribe directamente en el campo de búsqueda.
        - La búsqueda replica la lógica del buscador general de empresas, pero **sin utilizar sintaxis RSQL**. Internamente realiza una búsqueda por coincidencia parcial (OR) sobre los campos:
          - `numeroIdentificacion`
          - `nombre`
          - `razonSocial`
        - En función de los tiempos de respuesta del endpoint `GET /empresas`, puede ser recomendable implementar una **versión optimizada** de esta consulta.
        - Alternativamente, puede reutilizarse la implementación del buscador general (`GET /empresas`) transformando el parámetro `busqueda` para aplicar los filtros sobre los campos indicados, o permitiendo buscar directamente por dicho parámetro.
      operationId: findAllEmpresasFast
      security:
        - bearerAuth: []
      parameters:
        - name: busqueda
          in: query
          required: true
          description: Texto para búsqueda en los campos `nombre`, `razonSocial` y `numeroIdentificacion`.
          schema:
            type: string
            example: Universidad de
      responses:
        200:
          description: Devuelve la lista de entidades coincidentes con la búsqueda.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmpresaOutput"
        204:
          description: No hay entidades para los criterios de búsqueda utilizados.

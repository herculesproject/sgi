  - name: categorias-profesionales-public
    description: Categorías profesionales (endpoints accesibles sin autenticación)
  - name: colectivos
    description: Colectivos
  - name: datos-academicos
    description: Datos académicos de la persona
  - name: datos-academicos-public
    description: Datos académicos de la persona (endpoints accesibles sin autenticación)
  - name: datos-contacto
    description: Datos de contacto de la persona
  - name: datos-contacto-public
    description: Datos de contacto de la persona (endpoints accesibles sin autenticación)
  - name: datos-personales
    description: Datos personales de la persona
  - name: formacion
    description: Formación (servicios pasarela. No son necesarios para el funcionamiento del SGI)
  - name: niveles-academicos
    description: Niveles académicos
  - name: niveles-academicos-public
    description: Niveles académicos (endpoints accesibles sin autenticación)
  - name: personas
    description: Operaciones con personas
  - name: personas-public
    description: Operaciones con personas (endpoints accesibles sin autenticación)
  - name: sexos

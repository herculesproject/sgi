paths:
  /actividad-docente/{id}:
    get:
      tags:
        - actividad-docente
      summary: Detalle sobre los datos de la actividad docente de la persona (Servicio pasarela)
      description: |-
        Devuelve un listado con los datos de la actividad docente correspondiente al `id` de la persona y el `tipo de actividad`.

        ### Servicio de pasarela
        - Este endpoint está diseñado para su uso en integraciones o sincronizaciones con otros sistemas.
        - **No es necesario** para el funcionamiento del SGI.

        ### Detalles del filtrado
        - El parámetro `q` utiliza sintaxis **RSQL** para aplicar filtros sobre los campos soportados.
        
        ### Consideraciones para la implementación
        -  La implementación de este servicio es **opcional** y sólo se requiere si el SGI se utiliza como pasarela entre el sistema de gestión de personas corporativo  y cualquier otro sistema externo que requiera la actividad docente de la persona (como puede ser un sistema de gestión de CVN).
      operationId: findAllActividadDocenteByPersonaId
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Identificador único de la persona en el SGP.
          required: true
          schema:
            type: string
            example: P1
        - name: q
          in: query
          description: |-
            Criterios de búsqueda en formato RSQL. Campos por los que es necesario poder filtrar:
            - `tipoActividad`

            El tipo de actividad tiene que tener el siguiente formato de ejemplo:
            - XXX.XXX.XXX.XXX
          schema:
            type: string
            example: tipoActividad="030.040.000.000"
          required: true
      responses:
        200:
          description: Devuelve la lista de actividades docentes de la persona y el tipo actividad
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActividadDocenteOutput"
        204:
          description: No hay actividades docentes
  /actividad-docente/modificados-ids:
    get:
      tags:
        - actividad-docente
      summary: Listado de identificadores de las personas que han tenido modificaciones en la actividad docente. (Servicio pasarela)
      description: |-
        Devuelve un listado con los identificadores de las personas que han tenido modificaciones en la actividad docente

        ### Servicio de pasarela
        - Este endpoint está diseñado para su uso en integraciones o sincronizaciones con otros sistemas.
        - **No es necesario** para el funcionamiento del SGI.

        ### Detalles del filtrado
        - El parámetro `q` utiliza sintaxis **RSQL** para aplicar filtros sobre los campos soportados.

        ### Consideraciones para la implementación
        - La implementación de este servicio es **opcional** y sólo se requiere si el SGI se utiliza como pasarela entre el sistema de gestión de personas corporativo  y cualquier otro sistema externo que requiera conocer la modificación de la actividad docente (gestionada en el sistema de gestión de personas corporativo de origen).
      operationId: findAllActividadDocenteModificados
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: |-
            Criterios de búsqueda en formato RSQL. Campos por los que es necesario poder filtrar:
            - `tipoActividad`:
            - `fechaModificacion`:
          schema:
            type: string
            example: fechaModificacion=ge="2022-01-01T00:00:00Z";tipoActividad="030.040.000.000"
        - name: s
          x-sgi-pageable: false
          in: query
          description: |-
            Criterios de ordenación de la busqueda. 

            Nombre del campo por el que se ordena seguido de **asc** o **desc** para ordenar ascendente o descendentemente.
          schema:
            type: string
            example: fechaModificacion,asc
      responses:
        200:
          description: Devuelve la lista de identificadores
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        204:
          description: No hay identificadores

  /categorias-profesionales:
    get:
      tags:
        - categorias-profesionales
      summary: Listado de categorías profesionales
      description: |-
        Devuelve el listado de las categorías profesionales que se manejen en el sistema de gestión de personas corporativo ordenadas por `nombre` alfabéticamente de forma ascendente.
        (ejemplo: profesor contratado, profesor asociado, personal docente investigador, personal administración y servicios, etc.)

        ### Módulos del SGI donde se utiliza
        - CSP: **Convocatoria ➜ Requisitos equipo**, **Convocatoria ➜ Requisitos IP**

        ### Consideraciones para la implementación
        - Es un servicio candidato a ser utilizado en el formulario dinámico de personas (formly). Respecto a su uso en este formulario sería **opcional** si el alta/modificación de personas no están habilitadas y no se requiere este dato para realizar el alta/modificación. Su utilización o no, depende de la definición de requisitos para la gestión de personas propia de cada implantación.
        - Este servicio será necesario para la implantación del módulo CSP para hacer uso de la funcionalidad de validación de requisitos IP/equipo de la convocatoria.
      operationId: findAllCategoriasProfesionales
      security:
        - bearerAuth: []
      responses:
        200:
          description: Devuelve la lista de categorías profesionales ordenadas alfabéticamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoriaProfesionalOutput"
        204:
          description: No hay categorías profesionales
  /categorias-profesionales/{id}:
    get:
      tags:
        - categorias-profesionales
      summary: Detalle de la categoría profesional
      description: |-
        Devuelve la categoría profesional correspondiente al `id`

        ### Módulos del SGI donde se utiliza
        - CSP: **Convocatoria ➜ Requisitos equipo**, **Convocatoria ➜ Requisitos IP**, **Solicitud ➜ Datos solicitud RRHH ➜ Requisitos convocatoria**

        ### Consideraciones para la implementación
        - Este servicio se utiliza para dar información sobre la categoría profesional a la que pertenece la persona vinculada a la universidad
      operationId: findCategoriaProfesionalById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Identificador de la categoría profesional
          required: true
          schema:
            type: string
            example: C1
      responses:
        200:
          description: Devuelve la categoría profesional
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoriaProfesionalOutput"
        404:
          description: Categoría profesional no encontrada

  /public/categorias-profesionales/{id}:
    get:
      tags:
        - categorias-profesionales-public
      summary: Detalle de la categoría profesional
      description: |-
        Versión pública del endpoint `GET /categorias-profesionales/{id}`.

        Devuelve los mismos datos, pero **no requiere autenticación** desde el SGI.

        ### Módulos del SGI donde se utiliza
        - PUB: **Convocatoria ➜ Requisitos equipo**, **Convocatoria ➜ Requisitos IP**, **Solicitud ➜ Datos solicitud RRHH ➜ Requisitos convocatoria**

        ### Consideraciones para la implementación
        - Si los sistemas corporativos requieren autenticación, esta puede gestionarse desde el ESB o desde la propia implementación de la integración.
      operationId: findCategoriaProfesionalPublicById
      parameters:
        - name: id
          in: path
          description: Identificador de la categoría profesional
          required: true
          schema:
            type: string
            example: C1
      responses:
        200:
          description: Devuelve la categoría profesional
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoriaProfesionalOutput"
        404:
          description: Categoría profesional no encontrada

  /colectivos:
    get:
      tags:
        - colectivos
      summary: Lista de colectivos
      description: |-
        Devuelve los colectivos ordenados por `nombre` alfabéticamente de forma ascendente.
        Nomenclatura de la organización de la Universidad (Posibles valores: PAS, PSI, Alumnos, Becarios, Externo).

        ### Módulos del SGI donde se utiliza
        - CSP: **Solicitud ➜ Equipo ➜ Miembro equipo**, **Proyecto ➜ Equipo ➜ Miembro equipo**, **Grupo investigación ➜ Equipo ➜ Miembro equipo**, **Roles de equipo ➜ Colectivos**

        ### Consideraciones para la implementación
        - Es un servicio candidato a ser utilizado en el formulario dinámico de personas (formly). Respecto a su uso en este formulario sería **opcional** si el  alta/modificación de personas no están habilitadas y no se requiere este dato para realizar el alta/modificación de los datos de una persona. Su utilización o no, depende de la definición de requisitos para la gestión de personas propia de cada implantación.
        - El subconjunto de personas (colectivos) cuyos datos deben estar disponibles para el SGI serán aquellas que sean susceptibles de participar en las actividades de investigación
          o flujos de trabajo cubiertos por cualquiera de los módulos del SGI (miembros de los equipos de proyectos y/o contratos, grupos de investigación, miembros de comités de ética, autoría de PII y/o EBTs, etc.).
      operationId: findAllColectivos
      security:
        - bearerAuth: []
      responses:
        200:
          description: Devuelve la lista de colectivos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ColectivoOutput"
        204:
          description: No hay colectivos

  /colectivos/{id}:
    get:
      tags:
        - colectivos
      summary: Detalles del colectivo
      description: |-
        Devuelve el colectivo correspondiente al `id`.

        ### Módulos del SGI donde se utiliza
        - CSP: **Solicitud ➜ Equipo**, **Proyecto ➜ Equipo**, **Grupo investigación ➜ Equipo**

        ### Consideraciones para la implementación
        - Este servicio se utiliza para dar información sobre el colectivo al que pertenece la persona.
      operationId: findColectivoById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Identificador del colectivo
          required: true
          schema:
            type: string
            example: C1
      responses:
        200:
          description: Devuelve el colectivo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ColectivoOutput"
        404:
          description: Colectivo no encontrado

  /niveles-academicos:
    get:
      tags:
        - niveles-academicos
      summary: Lista de niveles académicos
      description: |-
        Devuelve los niveles académicos ordenados alfabéticamente de forma ascendente. Los campos del listado devuelto serán:
        - `id`: Identificador del nivel académico.
        - `nombre`: El nombre del nivel académico. (Posibles valores: Doctor, Ldo/Graduado, Diplomado, FP, etc).

        ### Módulos del SGI donde se utiliza
        - CSP: **Convocatoria ➜ Requisitos equipo**, **Convocatoria ➜ Requisitos IP**, **Solicitud ➜ Datos solicitud RRHH ➜ Requisitos convocatoria**

        ### Consideraciones para la implementación
        - Es un servicio candidato a ser utilizado en el formulario dinámico de personas (formly). Respecto a su uso en este formulario sería **opcional** si el  alta/modificación de personas no están habilitadas y no se requiere este dato para realizar el alta/modificación. Su utilización o no, depende de la definición de requisitos para la gestión de personas propia de cada implantación.
        - Este servicio será necesario para la implantación del módulo CSP para de hacer uso de la funcionalidad de comprobación de requisitos IP/equipo de la convocatoria.
      operationId: findAllNivelesAcademicos
      security:
        - bearerAuth: []
      responses:
        200:
          description: Devuelve la lista de niveles académicos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NivelAcademicoOutput"
        204:
          description: No hay niveles académicos
  /niveles-academicos/{id}:
    get:
      tags:
        - niveles-academicos
      summary: Detalles del nivel académico
      description: |-
        Devuelve el nivel académico correspondiente al `id`.

        ### Módulos del SGI donde se utiliza
        - CSP: **Convocatoria ➜ Requisitos equipo**, **Convocatoria ➜ Requisitos IP**, **Solicitud ➜ Datos solicitud RRHH ➜ Requisitos convocatoria**

        ### Consideraciones para la implementación
        - Este servicio se utiliza para dar información sobre el nivel académico al que pertenece la persona.
      operationId: findNivelAcademicoById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Identificador del nivel académico
          required: true
          schema:
            type: string
            example: N1
      responses:
        200:
          description: Devuelve el nivel académico
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NivelAcademicoOutput"
        404:
          description: Nivel académico no encontrado

  /public/niveles-academicos/{id}:
    get:
      tags:
        - niveles-academicos-public
      summary: Detalles del nivel académico
      description: |-
        Versión pública del endpoint `GET /niveles-academicos/{id}`.

        Devuelve los mismos datos, pero **no requiere autenticación** desde el SGI.

        ### Módulos del SGI donde se utiliza
        - PUB: **Convocatoria ➜ Requisitos equipo**, **Convocatoria ➜ Requisitos IP**, **Solicitud ➜ Datos solicitud RRHH ➜ Requisitos convocatoria**

        ### Consideraciones para la implementación
        - Si los sistemas corporativos requieren autenticación, esta puede gestionarse desde el ESB o desde la propia implementación de la integración.
      operationId: findNivelAcademicoPublicById
      parameters:
        - name: id
          in: path
          description: Identificador del nivel académico
          required: true
          schema:
            type: string
            example: N1
      responses:
        200:
          description: Devuelve el nivel académico
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NivelAcademicoOutput"
        404:
          description: Nivel académico no encontrado

  /datos-academicos/persona/{id}:
    get:
      tags:
        - datos-academicos
      summary: Datos académicos de la persona
      description: |-
        Devuelve los datos académicos de la persona correspondiente al `id`. Los campos del listado devuelto serán:
        - `nivelAcademico`
        - `fechaObtencion`

        ### Módulos del SGI donde se utiliza
        - CSP: **Convocatoria ➜ Listado - investigador**, **Solicitud ➜ Datos proyecto ➜ Equipo**, **Solicitud ➜ Datos solicitud RRHH ➜ Requisitos convocatoria**, **Proyecto ➜ Equipo**
        - ETI: **Solicitud evaluación proyecto ➜ Equipo investigador**, **Memoria ➜ Formulario**

        ### Consideraciones para la implementación
        - Es un servicio candidato a ser utilizado en el formulario dinámico de personas (formly). Respecto a su uso en este formulario sería **opcional** si el  alta/modificación de personas no están habilitadas y no se requiere esta información para ver el detalle de una persona o realizar el alta/modificación de sus datos. Su utilización o no, depende de la definición de requisitos para la gestión de personas propia de cada implantación.
        - Este servicio será necesarios para la implantación del módulo CSP para hacer uso de la funcionalidad  de validación de requisitos IP/equipo de la convocatoria.
        - Este servicio será necesario para la implantación del módulo de ETI para mostrar información en el listado de equipo de trabajo. Es un dato meramente informativo.
      operationId: findDatosAcademicosByPersonaId
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: |-
            Criterios de búsqueda en formato RSQL. Campos por los que es necesario poder filtrar:
            - `fechaObtencion`: La fecha en la que se obtiene el nivel académico
          schema:
            type: string
            example: fechaObtencion=ge="2022-01-01T00:00:00Z"
        - name: id
          in: path
          description: Identificador de la persona
          required: true
          schema:
            type: string
            example: P1
      responses:
        200:
          description: Devuelve los datos académicos de la persona
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatosAcademicosOutput"
        204:
          description: La persona no tiene datos académicos
        404:
          description: Persona no encontrada

  /public/datos-academicos/persona/{id}:
    get:
      tags:
        - datos-academicos-public
      summary: Datos académicos de la persona
      description: |-
        Versión pública del endpoint `GET /datos-academicos/persona/{id}`.

        Devuelve los mismos datos, pero **no requiere autenticación** desde el SGI.

        ### Módulos del SGI donde se utiliza
        - PUB: **Solicitud ➜ Datos solicitud RRHH ➜ Requisitos convocatoria**

        ### Consideraciones para la implementación
        - Si los sistemas corporativos requieren autenticación, esta puede gestionarse desde el ESB o desde la propia implementación de la integración.
      operationId: findDatosAcademicosPublicByPersonaId
      parameters:
        - name: id
          in: path
          description: Identificador de la persona
          required: true
          schema:
            type: string
            example: P1
      responses:
        200:
          description: Devuelve los datos académicos de la persona
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatosAcademicosOutput"
        204:
          description: La persona no tiene datos académicos
        404:
          description: Persona no encontrada

  /datos-contacto/persona/{id}:
    get:
      tags:
        - datos-contacto
      summary: Datos de contacto de la persona
      description: |-
        Devuelve los datos de contacto de la persona correspondiente al identificador.
        - **Identificador/Referencia**: debe de permitir identificar de forma única a una persona. A través de este campo se establecerán todas las relaciones de los datos del SGI dependientes de una persona.
        - **País**: Será una referencia. Deberá existir un maestro con todos los  países con su nombre e identificador para unificar cualquier campo "país" que se tenga que mostrar en el SGI. 
        - **Comunidad autónoma**: Será una referencia. Deberá existir un maestro con todas las comunidades autónomas  con su nombre e identificador para unificar cualquier campo comunidad autónoma que se tenga que mostrar en el SGI.
        - **Provincia**: Será una referencia. Deberá existir un maestro con todas las provincias con su nombre e identificador para unificar cualquier campo comunidad autónoma que se tenga que mostrar en el SGI.
        - **Ciudad**: Nombre de la ciudad. En este caso no existirá maestro.
        - **Dirección**: Será un literal sin patrón establecido para desglosar calle, portal, puerta, etc.
        - **Código postal**
        - **Emails**: Si solamente se dispone de un mail será un único campo, en caso contrario, se deberá disponer de una vista relacionada que contenga todas las direcciones de mail de la persona. Cada dirección deberá de llevar un atributo que permita distinguir cual es la dirección de mail  principal. (**obligatorio**)
        - **Teléfonos móviles/fijos**: Si solamente se dispone de un teléfono será un única campo, en caso contrario, se deberá disponer de una vista relacionada que contenga todos los teléfonos de la persona. (**obligatorio**)

        ### Módulos del SGI donde se utiliza
        - CSP: **Solicitud ➜ Datos solicitud RRHH ➜ Solicitante**, **Solicitud ➜ Datos solicitud RRHH ➜ Tutor**

        ### Consideraciones para la implementación
        - Es un servicio candidato a ser utilizado en el formulario dinámico de personas (formly). Respecto a su uso en este formulario sería **opcional** si el  alta/modificación de personas no están habilitadas y no se requiere este dato para ver el detalle de una persona o realizar el alta/modificación de sus datos. Su utilización o no, depende de la definición de requisitos para la gestión de personas propia de cada implantación.
        - Este servicio será necesario para la implantación del módulo CSP para de hacer uso del tipo de solicitudes de tipo RRHH.
      operationId: findDatosContactoByPersonaId
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Identificador de la persona
          required: true
          schema:
            type: string
            example: P1
      responses:
        200:
          description: Devuelve los datos de contacto de la persona
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatosContactoOutput"
        204:
          description: La persona no tiene datos de contacto
        404:
          description: Persona no encontrada

  /public/datos-contacto/persona/{id}:
    get:
      tags:
        - datos-contacto-public
      summary: Datos de contacto de la persona
      description: |-
        Versión pública del endpoint `GET /datos-contacto/persona/{id}`.

        Devuelve los mismos datos, pero **no requiere autenticación** desde el SGI.

        ### Módulos del SGI donde se utiliza
        - PUB: **Solicitud ➜ Datos solicitud RRHH ➜ Tutor**

        ### Consideraciones para la implementación
        - Si los sistemas corporativos requieren autenticación, esta puede gestionarse desde el ESB o desde la propia implementación de la integración.
      operationId: findDatosContactoPublicByPersonaId
      parameters:
        - name: id
          in: path
          description: Identificador de la persona
          required: true
          schema:
            type: string
            example: P1
      responses:
        200:
          description: Devuelve los datos de contacto de la persona
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatosContactoOutput"
        204:
          description: La persona no tiene datos de contacto
        404:
          description: Persona no encontrada

  /datos-personales/persona/{id}:
    get:
      tags:
        - datos-personales
      summary: Datos personales de la persona
      description: |-
        Devuelve los datos personales de la persona correspondiente al identificador.
        - **Identificador/Referencia**: debe de permitir identificar de forma única a una persona. A través de este campo se establecerán todas las relaciones de los datos del SGI dependientes de una persona.
        - **Fecha de nacimiento**: Indicará la fecha de nacimiento de la persona.
        - **País de nacimiento**: Será una referencia. Deberá existir un maestro con todos los  países con su descripción e identificador para unificar cualquier campo "país" que se tenga que mostrar en el SGI.
        - **Comunidad autónoma de nacimiento**: Será una referencia. Deberá existir un maestro con todas las comunidades autónomas con su descripción e identificador para unificar cualquier campo comunidad autónoma que se tenga que mostrar en el SGI.
        - **Ciudad de nacimiento**: Nombre de la ciudad. En este caso no existirá maestro.

        ### Módulos del SGI donde se utiliza
        - CSP: **Convocatoria ➜ Listado - investigador**, **Solicitud ➜ Datos proyecto ➜ Equipo**, **Solicitud ➜ Datos solicitud RRHH ➜ Solicitante**

        ### Consideraciones para la implementación
        - Es un servicio candidato a ser utilizado en el formulario dinámico de personas (formly). Respecto a su uso en este formulario sería **opcional** si el  alta/modificación de personas no están habilitadas y no se requiere este dato para ver el detalle de una persona o realizar el alta/modificación de sus datos. Su utilización o no, depende de la definición de requisitos para la gestión de personas propia de cada implantación.
        - Este servicio será necesario para la implantación del módulo CSP para de hacer uso del tipo de solicitudes de tipo RRHH.
      operationId: findDatosPersonalesByPersonaId
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Identificador de la persona
          required: true
          schema:
            type: string
            example: P1
      responses:
        200:
          description: Devuelve los datos personales de la persona
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatosPersonalesOutput"
        204:
          description: La persona no tiene datos personales
        404:
          description: Persona no encontrada

  /direccion-tesis:
    get:
      tags:
        - direccion-tesis y sexenios
      summary: Lista de Direcciones de tesis
      description: |-
        Devuelve la lista de Direcciones de tesis (incluida la personaRef indicando la persona que es el director de la tesis) cuya fecha de defensa sea en el año que se le pasa por parámetro
        - El SGI dispone de la posibilidad de activar, dentro del módulo PRC, baremos relacionados con la dirección de trabajos. Los trabajos dirigidos por una persona deben de ser recuperados del sistema corporativo correspondiente. Los baremos disponibles en el SGI están basados en la norma FECYT. De acuerdo a ésta, el baremo de "dirección de tesis" está definido en base a los tipos de trabajo que identifica la norma FECYT (proyecto de fin de carrera, tesis doctoral, trabajo conducente a la obtención de DEA, tesina, otros). Los datos relativos a la dirección de trabajos que precisa el SGI son:
          - **Identificador del trabajo**: Es un identificador único del trabajo (independientemente de su naturaleza: tesis, trabajo fin de máster, proyecto fin de carrera, etc).
          - **Identificador de la persona que dirige el trabajo**: Será una referencia que permitirá identificar a la persona en el conjunto de vistas relacionadas que se está creando.
          - **Título del trabajo**.
          - **Fecha de obtención del título**: Es la fecha de defensa del trabajo y que, por tanto, da lugar a la obtención del título correspondiente de acuerdo al tipo de trabajo que se dirige
          - **Nombre de la persona que realiza el trabajo**: Será el nombre del/de la alumno/a que realiza el trabajo.
          - **Tipo del trabajo dirigido**: Es un identificador del tipo de trabajo que permitirá aplicar el baremo de PRC asociado a la dirección de trabajos. Este baremo está definido de acuerdo a la tipología de trabajos recogida por la norma FECYT (proyecto de fin de carrera (id "055"), tesis doctoral (id "067"), trabajo conducente a la obtención de DEA (id "071"), tesina (id "066"), otros (id "OTHERS")). Como se está realizando una integración basada en vistas puede crearse una vista maestra de correspondencia entre los valores de la FECYT y los valores que puedan estar recogidos en el sistema de gestión de personas.
          - **Nombre del tipo de trabajo**: Es el nombre del tipo de trabajo asociado al identificador anterior. En caso que se disponga de una vista de correspondencia entre los valores de la FECYT y los valores que  recogidos en el sistema de gestión de personas, este campo podría ser redundante.
          - **Calificación obtenida**: Calificación obtenida en la defensa del trabajo.
          - Identificador de la persona que actúa como **co-director/a** (en caso de existir): Será una referencia que permitirá identificar a la persona en el conjunto de vistas relacionadas que se está creando.
          - **Doctorado mención europea**: Será un campo booleano que indicará si el doctorado ha recibido una mención europea.
          - **Fecha de la mención del doctorado europeo**: Fecha en la que se recibe la mención europea.
          - **Mención de calidad**: Será un campo booleano que indicará si el doctorado ha recibido una mención de calidad.
          - **Fecha de la mención de calidad**: Fecha en la que se recibe la mención calidad.
          - **Mención internacional**: Será un campo booleano que indicará si el doctorado ha recibido una mención internacional
          - **Mención industrial**: Será un campo booleano que indicará si el doctorado ha recibido una mención industrial.

        ## Módulos del SGI donde se utiliza
        - PRC: **Validación producción científica ➜ Dirección de tesis/TFM/TFG**

        ### Consideraciones para la implementación
        - Este servicio será necesario únicamente para la implantación del módulo de PRC (baremación de producción científica).
      operationId: findAllDireccionTesis
      security:
        - bearerAuth: []
      parameters:
        - name: anioDefensa
          in: query
          description: |-
            Año de consulta
          required: true
          schema:
            type: integer
            minimum: 1900
            maximum: 2200
            title: anioDefensa
            example: 2023
      responses:
        200:
          description: Devuelve la lista de direcciones de tesis
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DireccionTesisOutput"

  /personas:
    get:
      tags:
        - personas
      summary: Devuelve una lista paginada y filtrada de personas
      description: |-
        Devuelve una lista paginada y filtrada de personas que cumplen los criterios proporcionados.
        Este servicio del SGI se utilizará exclusivamente a través de un componente de búsqueda de personas.

        ### Módulos del SGI donde se utiliza
        - CSP: **Solicitud ➜ Listado**, **Solicitud ➜ Datos generales**, **Solicitud ➜ Equipo ➜ Miembro equipo**, **Solicitud ➜ Responsable económico ➜ Responsable**, **Proyecto ➜ Listado**, **Proyecto ➜ Equipo ➜ Miembro equipo**,  **Proyecto ➜ Responsable económico ➜ Responsable**, **Proyecto ➜ Socio ➜ Datos generales**, **Proyecto ➜ Socio ➜ Equipo ➜ Miembro equipo**, **Participación proyectos externos ➜ Autorizaciones ➜ Listado**, **Participación proyectos externos ➜ Autorizaciones ➜ Datos generales**, **Notificaciones CVN ➜ Listado**, **Notificaciones CVN ➜ Datos generales**, **Grupo investigación ➜ Listado**, **Grupo investigación ➜ Equipo investigación ➜ Miembro equipo**, **Grupo investigación ➜ Responsable económico ➜ Responsable**, **Grupo investigación ➜ Persona autorizada ➜ Persona**, **Ejecución económica ➜ Listado**, **Listados ➜ Miembros de grupos de investigación ➜ Listado**
        - ETI: **Solicitudes evaluación proyectos ➜ Listado**, **Solicitudes evaluación proyectos ➜ Listado**, **Solicitudes evaluación proyectos ➜ Equipo investigador ➜ Persona**, **Memorias ➜ Listado**, **Evaluaciones ➜ Listado**, **Seguimientos ➜ Listado**, **Evaluadores ➜ Listado**, **Evaluadores ➜ Datos generales**,  **Evaluadores ➜ Conflictos de interés**
        - EER: **Empresas de explotación de resultados ➜ Datos generales**, **Empresas de explotación de resultados ➜ Equipo empresarial ➜ Equipo emprendedor ➜ Equipo**, **Empresas de explotación de resultados ➜ Equipo empresarial ➜ Composición sociedad ➜ Miembro**, **Empresas de explotación de resultados ➜ Equipo empresarial ➜ Administración sociedad ➜ Miembro**
        - PII: **Invenciones ➜ Listado**, **Invenciones ➜ Equipo inventor ➜ Miembro**

        ### Detalles del filtrado
        - El parámetro `q` utiliza sintaxis **RSQL** para aplicar filtros sobre los campos soportados.

        ### Consideraciones para la implementación
        - Los datos de las personas en el SGI tienen carácter **exclusivamente informativo**.  
        - Es **obligatorio** garantizar que el campo `id` sea único y estable, y que las referencias a `tipoColectivo` y `colectivoId` (si se utilizan) correspondan a valores existentes.  
        - Dado su uso informativo, si algún dato no puede obtenerse de los sistemas corporativos, puede definirse una estrategia adecuada para completarlo (por ejemplo, valores por defecto o inferidos), siempre que se mantenga la coherencia con el resto de la información.
        - Aunque el soporte completo de búsquedas RSQL es opcional, **se recomienda implementarlo** para mantener la compatibilidad futura con el SGI.

        ### Búsquedas necesarias que deben soportarse
        - **Búsqueda general** (buscador de personas):  
          Filtra por nombre, apellidos, email:
          Ejemplo:  
          ```
          nombre=ik=ejemplo,apellidos=ik=ejemplo,email=ik=ejemplo,nombreApellidos=ik=ejemplo
          ```
        - **Por identificadores** (listados internos del SGI):  
          ```
          id=in=(P1,P2,P3)
          ```
        - **Por colectivo**:
          `tipoColetivo` y `colectivoId` son mutuamente excluyentes. En el caso se recibir un tipoColectivo se traducirá a los colectivos que lo formen.
          ```
          colectivoId=in=(refAlumnos,refExterno);
          ```
            El SGI dispone de una serie de tipos de colectivos definidos internamente y que son utilizados como filtro en las operaciones de búsqueda de personas. 
            Los tipos de colectivos internos del SGI que deben ser mapeados con los nombres de colectivos que se recopilen del sistema de gestión de personas son:
            - **Solicitante ética**: personal de investigación que crea las solicitudes de evaluación de proyectos en ética.
            - **Evaluador ética**: personal de investigación que puede realizar las evaluaciones de las memorias de investigación o bien personal técnico que puede realizar las tareas de evaluación de memorias.
            - **Equipo trabajo ética**: personal de investigación que puede formar parte del equipo de trabajo de una solicitud de evaluación de ética.
            - **Solicitante csp**: personal de investigación que puede figurar como solicitante de una ayuda/convocatoria (a pesar de que, por norma general,  los colectivos asociados a este tipo pudieran coincidir con los asociados a los roles de tipo "equipo investigación" de la tabla "rol proyecto", se crea este tipo de colectivo para simplificar la búsqueda en pantallas en las que no es necesario distinguir el rol a la vez que para independizar la configuración de colectivos por si fuera necesario llegado el caso).
            - **Responsable económico csp**: personal de la Universidad que puede ser el responsable económico de un proyecto y/o de un grupo.
            - **Autor de invención**: persona física que tiene un porcentaje de autoría de la invención. Puede ser un investigador de la Universidad o externo.
            - **Responsable proyecto externo**: persona que puede participar como responsable (IP) de un proyecto externo (autorización de participación en proyecto externo). 
            - **Autor prc**: personal de investigación que alimenta su CVN y que por lo tanto figura como autor de items de producción científica.
            - **Destinatario comunicado**: personal de la Universidad o de investigación (de la Universidad o externo) que puede ser destinatario de un comunicado enviado por el SGI.
            - **Persona autorizada grupo**: personal de la Universidad que puede der la persona autorizada de un grupo para realizar la tarea de validar/rechazar items de producción científica y persona autorizadas para la creación de solicitudes de modificación del grupo.
            - **Tutor/a csp**: personal de investigación que puede ser tutor/a de un trabajo postdoctoral, predoctoral, etc, trabajos de solicitudes de RRHH.
            - **Miembro equipo empresa de explotación de resultados**: personal de la Universidad que puede participar en una empresa de explotación de resultados como solicitante, parte del equipo emprendedor, de la composición de la sociedad o de la administración de la misma.
      operationId: findAllPersonas
      security:
        - bearerAuth: []
      x-sgi-return-page: true # Remplaza el List de la respuesta un Page
      parameters:
        - name: X-Page
          in: header
          description: Nº de pagina
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 1
        - name: X-Page-Size
          in: header
          description: Nº de elementos por página
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 5
        - name: q
          in: query
          required: true
          description: |-
            Criterios de búsqueda en formato RSQL. Campos por los que es necesario poder filtrar:
            - `id`: Identificador único de la persona en el SGP.
            - `tipoColectivo`: Contiene los tipos de colectivos definidos en el SGI para ser usados como filtro a la hora de realizar la búsqueda de personas.
            - `colectivoId`: Identificador de la entidad colectivo. Agrupación de personas sobre las que se van a realizar las búsquedas de personas.
            - `nombre`: Nombre de la persona.
            - `apellidos`: Apellidos de la persona.
            - `email`: Correo electrónico de la persona.
            - `nombreApellidos`: Nombre y apellidos de la persona.
          schema:
            type: string
            example: (nombreApellidos=ik="maria",email=ik="maria");tipoColectivo=="SOLICITANTE_CSP"
        - name: s
          x-sgi-pageable: true # Sustituye este parametro en un Pageable al que se le pasa este parametro como ordenación.
          in: query
          description: |-
            Criterios de ordenación. Formato: `campo,asc|desc`.
          schema:
            type: string
            example: nombre,asc
      responses:
        200:
          description: Devuelve la lista de personas (respuesta paginada).
          headers:
            X-Page-Count:
              description: Nº de páginas
              schema:
                type: integer
                example: 2
            X-Page-Total-Count:
              description: Nº de elementos en la página
              schema:
                type: integer
                example: 1
            X-Total-Count:
              description: Nº total de elementos
              schema:
                type: integer
                example: 6
            X-Page-Size:
              description: Nº de elementos por página
              schema:
                type: integer
                example: 5
            X-Page:
              description: Nº de página
              schema:
                type: integer
                example: 1
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PersonaOutput"
        204:
          description: No hay personas para los criterios de busqueda utilizados.
        400:
          description: Parámetros no válidos (ej. sintaxis RSQL inválida o parámetros de paginación fuera de rango).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        401:
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        403:
          $ref: "#/components/responses/AccessDeniedErrorResponse"
        404:
          description: Persona no encontrada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"


openapi: 3.0.3
info:
  title: Sistema de Gestión de Personas (SGP)
  description: |-
    API de integración del **Sistema de Gestión de Personas (SGP)** con el **SGI**.

    La integración con el **SGP** es **imprescindible**, con independencia de los módulos del SGI que se implanten. 
    El SGI no almacena datos propios de las personas ni de su vinculación con la Universidad.

    Todos los datos relativos a las personas —incluyendo su identificación, datos administrativos y su relación 
    o vinculación con la Universidad— deben recuperarse de los sistemas corporativos correspondientes.

    Dependiendo de la organización interna de la Universidad, la información que el SGI necesita sobre una persona 
    puede proceder de uno o varios sistemas fuente.

    Bajo la denominación **Sistema de Gestión de Personas (SGP)** se agrupa, por tanto, cualquier sistema corporativo 
    del que la Universidad deba extraer los datos relativos a personas necesarios para el funcionamiento del SGI.
  version: 0.1.0
  contact: {}


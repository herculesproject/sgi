  /vinculaciones/persona/{id}:
    get:
      tags:
        - vinculaciones
      summary: Datos de vinculación vigentes de la persona
      description: |-
        Devuelve los datos de vinculación vigentes de la persona correspondiente al `id`
        Este bloque de datos, relativos a la vinculación de una persona con la Universidad son:
        - **Categoría**: Será la categoría profesional vigente de la persona. Será una referencia a través de la que se podrá obtener el nombre de la categoría en el listado de categorías profesionales.
        - **Fecha de obtención de la categoría**: Es la fecha a partir de la que la persona dispone de la categoría profesional vigente, indicada en el campo anterior.
        - **Departamento**: Departamento al que pertenece la persona en la actualidad. Será una referencia que permitirá identificar el nombre del departamento en la vista de datos maestros que contendrá el listado de departamentos de la Universidad.
        - **Centro** Centro al que pertenece la persona en la actualidad. Será una referencia que permitirá identificar el nombre del centro en la vista de datos maestros que contendrá el listado de centros de la Universidad.
        - Indicador (sí/no) de **personal propio**: Será un valor booleano que indicará si la persona es personal laboral de la Universidad en el momento actual o no.
        - Identificador de la **empresa a la que está vinculada la persona**:  Si la persona no pertenece a la Universidad, pero está registrada en el sistema de gestión de personas corporativo por tener establecido con ella algún vínculo colaborativo, se deberá disponer del identificador de la organización/empresa a la que pertenece la persona. Este identificador hará referencia al sistema de gestión de empresas (o a las vistas que se creen conteniendo la información a obtener de este sistema corporativo).
        - Identificador de la **entidad propia/universidad**: Si la persona es personal de la Universidad, se dispondrá en este campo del identificador con el que la propia Universidad está registrada en el sistema de gestión de empresas corporativo (o de las vistas que se creen conteniendo la información a obtener de este sistema corporativo). Es decir, la propia Universidad deberá estar registrada en el sistema de gestión de empresas.
      
        ### Módulos del SGI donde se utiliza
        - CSP: **Convocatoria ➜ Listado - investigador**, **Solicitud ➜ Datos proyecto ➜ Equipo**, **Solicitud ➜ Datos solicitud RRHH ➜ Tutor**, **Solicitud ➜ Datos solicitud RRHH ➜ Requisitos convocatoria**, **Proyecto ➜ Equipo**, **Grupo investigación ➜ Datos generales**
        - ETI: **Solicitud evaluación proyecto ➜ Equipo investigador**, **Memoria ➜ Formulario**

        ### Consideraciones para la implementación
        - Es un servicio candidato a ser utilizado en el formulario dinámico de personas (formly). Respecto a su uso en este formulario sería **opcional** si el  alta/modificación de personas no están habilitadas y no se requiere este dato para ver el detalle de una persona o realizar el alta/modificación de sus datos. Su utilización o no, depende de la definición de requisitos para la gestión de personas propia de cada implantación.
        - Este servicio será necesario para la implantación del módulo CSP para hacer uso de la funcionalidad de comprobación de requisitos IP/equipo de la convocatoria y de la funcionalidad de solicitudes de RRHH.
        - Este servicio será necesario para la implantación del módulo de ETI para mostrar información en el listado de equipo de trabajo. Es un dato meramente informativo.
      operationId: findVinculacionActualByPersonaId
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Identificador de la persona
          required: true
          schema:
            type: string
            example: P1
      responses:
        200:
          description: Devuelve los datos de vinculación vigentes de la persona
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VinculacionOutput"
        204:
          description: La persona no tiene vinculaciones
        404:
          description: Persona no encontrada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

  /public/vinculaciones/persona/{id}:
    get:
      tags:
        - vinculaciones-public
      summary: Datos de vinculación vigentes de la persona
      description: |-
        Versión pública del endpoint `GET /vinculaciones/persona/{id}`.
        Devuelve los mismos datos básicos de las vinculaciones de la persona, pero **no requiere autenticación** desde el SGI.

        ### Módulos del SGI donde se utiliza
        PUB: **Solicitud ➜ Datos solicitud RRHH ➜ Tutor**, **Solicitud ➜ Datos solicitud RRHH ➜ Requisitos convocatoria**

        ### Consideraciones para la implementación
        - Si los sistemas corporativos requieren autenticación, esta puede gestionarse desde el ESB o desde la propia implementación de la integración.
      operationId: findVinculacionActualPublicByPersonaId
      parameters:
        - name: id
          in: path
          description: Identificador de la persona
          required: true
          schema:
            type: string
            example: P1
      responses:
        200:
          description: Devuelve los datos de vinculación vigentes de la persona
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VinculacionOutput"
        204:
          description: La persona no tiene vinculaciones
        404:
          description: Persona no encontrada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

  /vinculaciones/persona/{id}/vinculaciones-categorias-profesionales:
    get:
      tags:
        - vinculaciones
      summary: Datos de vinculación de las categorías profesionales en el rango de fechas indicado
      description: |-
        Devuelve el histórico de las categorías profesionales que ha ocupado la persona en la universidad en el rango de fechas indicado de la persona correspondiente al `id`
        Históricos de categorías. Se deberá disponer de una vista que contenga . El detalle de campos necesarios es:
        - **Categoría profesional**: Será una referencia a través de la que se podrá obtener el nombre de la categoría en el listado de categorías profesionales.
        - **Fecha de obtención**: Es la fecha a partir de la que se dispone de la categoría profesional indicada en el campo anterior.

        ### Módulos del SGI donde se utiliza
        - CSP: **Grupo investigación ➜ Equipo**
        - EER: **Empresa de explotación de resultados ➜ Equipo empresarial ➜ Equipo emprendedor**

        ### Consideraciones para la implementación
        - Es un servicio candidato a ser utilizado en el formulario dinámico de personas (formly). Respecto a su uso en este formulario sería **opcional** en caso de que el alta/modificación de personas no están habilitadas y no se requiere este dato para ver el detalle de una persona o realizar el alta/modificación de sus datos. Su utilización o no, depende de la definición de requisitos para la gestión de personas propia de cada implantación.
        - Este servicio será necesario para la implantación del módulo CSP y EER.
      operationId: findVinculacionCategoriaProfesionalByPersonaId
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Identificador de la persona
          required: true
          schema:
            type: string
            example: P1
        - name: q
          in: query
          description: |-
            Criterios de busqueda en formato RSQL:
            - fechaObtencion
          schema:
            type: string
            example: fechaObtencion=gt=1990-01-01;fechaObtencion=lt=1993-01-01
      responses:
        200:
          description: Devuelve la lista de categorías profesionales
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VinculacionCategoriaProfesionalOutput"
        204:
          description: La persona no tiene vinculaciones
        404:
          description: Persona no encontrada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

  /formacion/{id}:
    get:
      tags:
        - formacion
      summary: Detalle sobre los datos de la formación recibida de la persona (Servicio pasarela)
      description: |-
        Devuelve un listado con los datos de la formación recibida, dependiendo del `id` de la persona y el `tipo de formación`

        ### Servicio de pasarela
        - Este endpoint está diseñado para su uso en integraciones o sincronizaciones con otros sistemas.
        - **No es necesario** para el funcionamiento del SGI.
        
        ### Consideraciones para la implementación
        - La implementación de este servicio es **opcional** y sólo se requiere si el SGI se utiliza como pasarela entre el sistema de gestión de personas corporativo y cualquier otor sistema externo que requiera  los datos de la formación de la persona (como puede ser el sistema de gestión de CVN).
      operationId: findFormacionByPersonaIdAndTipoFormacionId
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Identificador de la persona
          required: true
          schema:
            type: string
            example: P1
        - name: tipoFormacion
          in: query
          description: |-
            El tipo de formación tiene que tener el siguiente formato de ejemplo:
            - XXX.XXX.XXX.XXX
          required: true
          schema:
            type: string
            example: "030.040.000.000"
      responses:
        200:
          description: Devuelve la lista de formaciones recibidas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FormacionOutput"
        204:
          description: No hay formaciones
  /formacion/modificados-ids:
    get:
      tags:
        - formacion
      summary: 	Personas que han tenido modificaciones en la formación (Servicio pasarela)
      description: |-
        Devuelve un listado de identificadores de las personas que han tenido modificaciones en la formación realizada

        ### Servicio de pasarela
        - Este endpoint está diseñado para su uso en integraciones o sincronizaciones con otros sistemas.
        - **No es necesario** para el funcionamiento del SGI.

        ### Detalles del filtrado
        - El parámetro `q` utiliza sintaxis **RSQL** para aplicar filtros sobre los campos soportados.

        ### Consideraciones para la implementación
        - La implementación de este servicio es **opcional** y sólo se requiere si el SGI se utiliza como pasarela entre el sistema de gestión de personas corporativo y cualquier otro sistema externo que requiera conocer las modificaciones en los datos de formación de las personas.
      operationId: findAllFormacionModificados
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: |-
            Criterios de busqueda en formato RSQL:
            - tipoFormacion
            - fechaModificacion
          schema:
            type: string
            example: (fechaModificacion=ge="2022-01-01T00:00:00Z";tipoFormacion="030.040.000.000")
        - name: s
          x-sgi-pageable: false
          in: query
          description: |-
            Criterios de ordenación. Formato: `campo,asc|desc`.
          schema:
            type: string
            example: fechaModificacion,asc
      responses:
        200:
          description: Devuelve la lista de identificadores
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        204:
          description: No hay identificadores


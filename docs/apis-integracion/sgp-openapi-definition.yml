        type:
          type: string
          description: Tipo de error.
          example: urn:problem-type:authentication
        title:
          type: string
          description: Descripción del error.
          example: Unauthorized
        status:
          type: integer
          description: Código HTTP del error.
          example: 401
        instance:
          type: string
          description: Identificador único del error.
          example: urn:uuid:6ec423fd-87fb-4470-9c5e-60c4628bd7eb
        detail:
          type: string
          description: Información adicional del error.
          example: No token found
    BadRequestError:
      type: object
      description: Este error se produce cuando el sistema recibe una petición incorrecta y no existe un error más especifico.
      required:
        - type
        - title
        - status
        - instance
      properties:
        type:
          type: string
          description: Tipo de error.
          example: urn:problem-type:bad-request
        title:
          type: string
          description: Descripción del error.
          example: Bad Request
        status:
          type: integer
          description: Código HTTP del error.
          example: 400
        instance:
          type: string
          description: Identificador único del error.
          example: urn:uuid:6ec423fd-87fb-4470-9c5e-60c4628bd7eb
        detail:
          type: string
          description: Información adicional del error.
          example: Page index must not be less than zero

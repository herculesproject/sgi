  /proyectos/formly/{id}:
    get:
      tags:
        - proyectos
      summary: Devuelve los datos de un proyecto económico/orgánica/centro de coste para ser mostrados en el formulario dinámico
      description: |-
        Devuelve el detalle, en el formato del formulario dinámico (**Formly**), del proyecto económico/orgánica/centro de coste correspondiente al `id`.

        ### Módulos del SGI donde se utiliza
        - CSP: **Proyecto ➜ Configuración económica ➜ Identificación**

        ### Consideraciones para la implementación
        - Este servicio se utiliza en las distintas pantallas de los módulos del SGI anteriormentente mencionadas así como desde las acciones **Ver** y **Editar** del buscador de proyectos.  
        - Su implementación es **obligatoria** para mostrar el detalle de los proyectos económicos/orgánicas/centros de coste y en el caso que se habilite la  solicitud de modificación de los mismos desde el SGI.
        - La definición del objeto de respuesta de este endpoint debe estar **alineada con la estructura de los formularios dinámicos (Formly)**, para permitir visualizar y editar los campos que se deseen mantener.  
        - El esquema de la respuesta puede adaptarse en cada implantación en función de las necesidades y del diseño de los formularios Formly en los que se utilice.
      operationId: findProyectoFormlyById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Identificador del proyecto
          required: true
          schema:
            type: string
            example: P1
      responses:
        200:
          description: Devuelve el detalle del proyecto para el Formly.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProyectoFormlyOutput"
        401:
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        403:
          $ref: "#/components/responses/AccessDeniedErrorResponse"
        404:
          description: Proyecto no encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
    put:
      tags:
        - proyectos
      summary: Expone los datos de un proyecto económico/orgánica/centro de coste para su actualización en el sistema de gestión económica
      description: |-
        Expone los datos del  proyecto económico/orgánica/centro de coste correspondiente al `id` para que el sistema de gestión económica procede a su actualización. El SGI admite por configuración que el SGE realice la actualización de forma **síncrona** o **asíncrona**.
        
        ### Módulos del SGI donde se utiliza
        - CSP: **Proyecto ➜ Configuración económica ➜ Identificación**

        ### Consideraciones para la implementación
        - Este servicio se utiliza en las distintas pantallas de los módulos del SGI anteriormentente mencionadas así como desde la acción **Editar** del buscador de proyectos.  
        - Su implementación es **opcional** si no se habilita la modificación de proyecto SGE en **Configuración ➜ Configuración CSP** del módulo Administración.  
        - La definición del **cuerpo de la solicitud** debe estar **alineada con la estructura del formulario dinámico (Formly)** de modificación, para permitir editar los campos definidos en cada implantación.  
        - El **esquema del cuerpo de la solicitud** puede adaptarse en función de las necesidades de cada implantación o de los sistemas corporativos de origen.
      operationId: updateProyectoFormly
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Identificador del proyecto
          required: true
          schema:
            type: string
            example: E1
      requestBody:
        description: Datos actualizados del proyecto
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProyectoFormlyInput"
      responses:
        204:
          description: Proyecto económico actualizado
        400:
          description: Datos del proyecto incorrectos o error en la validación.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        404:
          description: Proyecto no encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
          
  /proyectos/{id}/notificaciones/relaciones-eliminadas:
    post:
      tags:
        - proyectos
      summary: Notifica al SGE la eliminación de relaciones en el SGI entre el proyecto del SGE y uno o varios proyectos y/o grupos del SGI
      description: |- 
        Notifica al SGE la eliminación de relaciones en el SGI entre el proyecto del SGE y uno o varios proyectos y/o grupos del SGI

        ### Módulos del SGI donde se utiliza
        - CSP: **Proyecto ➜ Configuración económica ➜ Identificación**

        ### Consideraciones para la implementación
        - Su implementación es **opcional** si no se habilita la configuración  de proyecto SGE en **Configuración ➜ Configuración CSP**
        - No obstante, si el **SGE no necesita reaccionar ante esta notificación**, el servicio puede implementarse sin lógica interna (endpoint vacío que responda correctamente).
      operationId: processNotificacionRelacionEliminada
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Identificador del proyecto
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/RelacionEliminadaInput"
      responses:
        202:
          description: Notificación procesada correctamente
        400:
          description: Error al procesar la notificación porque los datos de la notificación no son validos o porque el SGE no permite realizar la acción
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        404:
          description: Proyecto no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

  /proyectos/anualidades:
    post:
      tags:
        - proyectos
      summary: Notifica al sistema de gestión económica el presupuesto de un proyecto
      description: |-
        Notifica al sistema de gestión económica el presupuesto de un proyecto. La definición del presupuesto en el SGI se establece por anualidad y partida presupuestaria.

        ### Módulos del SGI donde se utiliza
        - CSP: **Proyecto ➜ Configuración económica ➜ Presupuesto**, **Notificación presupuestos al SGE**

        ### Consideraciones para la implementación
        - La implementación de este servicio es **opcional**.
        - Será necesaria únicamente cuando esté habilitada la configuración para la notificación de presupuestos al SGE.
      operationId: createProyectoAnualidadPartidas
      security:
        - bearerAuth: []
      requestBody:
        description: Lista de partidas presupuestarias por anualidad y proyecto
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/ProyectoAnualidadPartidaInput"
      responses:
        204:
          description: Devuelve el identificador del proyecto
        400:
          description: Datos del proyecto incorrectos o error en la validación.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"

  /seguimiento-justificacion:
    get:
      tags:
        - seguimiento-justificacion
      summary: Devuelve el listado de gastos justificados para un proyecto y uno o más periodos de justificación
      description: |-
        Devuelve el listado de gastos justificados para un proyecto SGI y uno o más periodos de justificación para su inclusión en un requerimiento de justificación.

        ### Búsquedas necesarias que deben soportarse
        - `proyectoId`
        - `justificacionId`
        - `numRegistroProveedor`
        - `importeJustificado`
        - `fechaDevengo`
        - `fechaPago`
        - `id`

        ### Módulos del SGI donde se utiliza
        - CSP: **Ejecución económica ➜ Seguimiento justificación ➜ Requerimientos de justificación**

        ### Consideraciones para la implementación
        - La implementación de este servicio es **opcional**.
        - Será necesaria únicamente cuando esté habilitada la configuración para añadir gastos justificados a los requerimientos de justificación.
      operationId: findAllSeguimientoJustificacion
      security:
        - bearerAuth: []
      x-sgi-return-page: true # Remplaza el List de la respuesta un Page
      parameters:
        - name: X-Page
          in: header
          description: Nº de pagina
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 1
        - name: X-Page-Size
          in: header
          description: Nº de elementos por página
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 5
        - name: q
          in: query
          required: true
          description: |-
            Criterios de busqueda en formato RSQL. Se puede buscar por los siguientes campos:
            - proyectoId
            - justificacionId
            - numRegistroProveedor
            - importeJustificado
            - fechaDevengo
            - fechaPago
            - id
          schema:
            type: string
            example: proyectoId==P1;justificacionId==J1
        - name: s
          x-sgi-pageable: true # Sustituye este parametro en un Pageable al que se le pasa este parametro como ordenación.
          in: query
          description: |-
            Criterios de ordenación. Formato: `campo,asc|desc`.
          schema:
            type: string
            example: id,asc
      responses:
        200:
          description: Devuelve la lista de facturas emitidas
          headers:
            X-Page-Count:
              description: Nº de páginas
              schema:
                type: integer
                example: 2
            X-Page-Total-Count:
              description: Nº de elementos en la página
              schema:
                type: integer
                example: 1
            X-Total-Count:
              description: Nº total de elementos
              schema:
                type: integer
                example: 6
            X-Page-Size:
              description: Nº de elementos por página
              schema:
                type: integer
                example: 5
            X-Page:
              description: Nº de página
              schema:
                type: integer
                example: 1
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GastoJustificadoOutput"
        204:
          description: No hay gastos para los criterios de busqueda utilizados.
        400:
          description: Parámetros no válidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"


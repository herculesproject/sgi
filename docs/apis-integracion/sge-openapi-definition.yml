              schema:
                $ref: "#/components/schemas/DatoEconomicoDetalleOutput"
        400:
          description: Tipo de operación no válido o no informado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        404:
          description: No existe un dato económico con el identificador indicado para el tipo de operación informado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

  /facturas-emitidas:
    get:
      tags:
        - facturas-emitidas
      summary: Devuelve la lista con las facturas emitidas del SGE
      description: |-
        Devuelve la lista de facturas emitidas filtradas y ordenadas.
        La búsqueda se realiza mediante una expresión en formato **RSQL** enviada en el parámetro `q`.
        El filtro por tipo de operación se aplica internamente al valor **FEM** (Facturas Emitidas), por lo que no es necesario informarlo en la búsqueda.

        ### Búsquedas necesarias que deben soportarse
        - `proyectoId`
        - `anualidad`
        - `estado`
        - `fechaFactura`
        - `reducida` (no filtra, solo afecta a columnas devueltas)

        El campo **reducida** puede tomar los siguientes valores:
        - `true`: sólo se envían las columnas a mostrar en la pantalla principal
        - `false`: se envían todas las columnas (para su exportación)
        Si no se informa, se considera `false`.

        ### Módulos del SGI donde se utiliza
        - CSP: **Ejecución económica ➜ Facturas emitidas**

        ### Consideraciones para la implementación
        - La implementación de este servicio es **opcional**. En caso que el SGE no posibilite la implementación de este servicio se podría establecer una configuración en el SGI para deshabilitar este apartado Facturas emitidas. En este caso no se permitiría mostrar el detalle de las facturas emitidas desde el SGI. También se podría establecer una configuración para deshabilitar todo el apartado de Ejecución Económica. Esto supondría que no se podría realizar el seguimiento de los datos económicos de proyectos y grupos desde el SGI.
      operationId: findAllFacturasEmitidas
      security:
        - bearerAuth: []
      x-sgi-return-page: true # Remplaza el List de la respuesta un Page
      parameters:
        - name: X-Page
          in: header
          description: Nº de pagina
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 1
        - name: X-Page-Size
          in: header
          description: Nº de elementos por página
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 5
        - name: q
          in: query
          required: true
          description: |-
            Criterios de búsqueda en formato RSQL. Campos por los que es necesario poder filtrar:
            - `proyectoId`
            - `anualidad`
            - `estado`
            - `fechaFactura`
            - `reducida` (no filtra, solo afecta a columnas devueltas)
          schema:
            type: string
            example: proyectoId==P1;estado=="VALIDADO";reducida==false
        - name: s
          x-sgi-pageable: true # Sustituye este parametro en un Pageable al que se le pasa este parametro como ordenación.
          in: query
          description: |-
            Criterios de ordenación. Formato: `campo,asc|desc`.
          schema:
            type: string
            example: id,asc
      responses:
        200:
          description: Devuelve la lista de facturas emitidas
          headers:
            X-Page-Count:
              description: Nº total de páginas
              schema:
                type: integer
                example: 2
            X-Page-Total-Count:
              description: Número de elementos en la página actual
              schema:
                type: integer
                example: 1
            X-Total-Count:
              description: Nº total de elementos
              schema:
                type: integer
                example: 6
            X-Page-Size:
              description: Nº de elementos por página
              schema:
                type: integer
                example: 5
            X-Page:
              description: Nº de página actual
              schema:
                type: integer
                example: 1
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FacturaEmitidaOutput"
        204:
          description: No hay facturas emitidas para los criterios de busqueda utilizados.
        400:
          description: Parámetros no válidos (ej. sintaxis RSQL inválida o parámetros de paginación fuera de rango).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"

  /facturas-emitidas/columnas:
    get:
      tags:
        - facturas-emitidas
      summary: Devuelve la lista de columnas dinámicas de las facturas emitidas
      description: |-
        Devuelve la lista de columnas dinámicas configuradas para las Facturas emitidas.
        La selección de columnas se realiza exclusivamente en función del campo `reducida`.

        ### Búsquedas necesarias que deben soportarse
        - `reducida` (opcional)

        El campo **reducida** puede tomar los siguientes valores:
        - **true** → Devuelve únicamente las columnas visibles en la pantalla principal.
        - **false** → Devuelve todas las columnas disponibles (modo exportación).
        Si no se informa el campo `reducida`, se considerará **false**.

        ### Módulos del SGI donde se utiliza
        - CSP: **Ejecución económica ➜ Facturas emitidas**

        ### Consideraciones para la implementación
        - La implementación de este servicio es **opcional**. En caso que el SGE no posibilite la implementación de este servicio se podría establecer una configuración en el SGI para deshabilitar este apartado Facturas emitidas. En este caso no se permitiría mostrar el detalle de las facturas emitidas desde el SGI. También se podría establecer una configuración para deshabilitar todo el apartado de Ejecución Económica. Esto supondría que no se podría realizar el seguimiento de los datos económicos de proyectos y grupos desde el SGI. 
        - No se aplican filtros adicionales distintos del campo `reducida`.
      operationId: findAllColumnasFacturasEmitidas
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: |-
            Criterios de búsqueda en formato RSQL. Campos por los que es necesario poder filtrar:
            - reducida
          schema:
            type: string
            example: reducida==false
      responses:
        200:
          description: Devuelve la lista de columnas asociadas al modo de visualización.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ColumnaOutput"
        204:
          description: No hay columnas configuradas.
        400:
          description: Parámetros de búsqueda no válidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"


          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacturaEmitidaDetalleOutput"
        400:
          description: Identificador no válido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        404:
          description: Factura emitida no encontrada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"


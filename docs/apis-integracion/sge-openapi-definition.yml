                $ref: "#/components/schemas/BadRequestError"

components:
  schemas:
    ClasificacionSGEOutput:
      type: object
      properties:
        id:
          type: string
          example: C1
        nombre:
          type: string
          example: Clasificacion 1
    CodigoEconomicoGastoOutput:
      type: object
      properties:
        id:
          type: string
          example: CG1
        nombre:
          type: string
          example: TRANSPORTES
        fechaInicio:
          type: string
          format: date
          example: "2024-01-01"
        fechaFin:
          type: string
          format: date
          example: "2024-03-15"
    CodigoEconomicoIngresoOutput:
      type: object
      properties:
        id:
          type: string
          example: CI1
        nombre:
          type: string
          example: SUBVENCIONES PARA GASTOS
        fechaInicio:
          type: string
          format: date
          example: "2024-01-01"
        fechaFin:
          type: string
          format: date
          example: "2024-03-15"
    ColumnaOutput:
      type: object
      properties:
        id:
          type: string
          example: C1
          description: Identificador único de la columna
        nombre:
          type: string
          example: "Nº registro"
          description: Nombre visible de la columna
        acumulable:
          type: boolean
          example: false
          description: Indica si la columna es acumulable (sumable) o no
    ComentarioInput:
      type: object
      properties:
        comentario:
          type: string
          example: Comentario...
    DatoEconomicoOutput:
      type: object
      properties:
        id:
          type: string
          example: "1"
        proyectoId:

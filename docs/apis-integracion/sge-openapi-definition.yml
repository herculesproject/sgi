openapi: 3.0.3
info:
  title: Sistema de Gestión Económica (SGE)
  description: |-
    API de integración del **Sistema de Gestión Económica (SGE)** con el **SGI**.

    Se entiende por SGE el sistema universitario que centraliza la gestión de datos económicos en general o de las actividades de investigación en particular (gastos y facturas recibidas, facturas emitidas, ingresos, reservas de crédito, presupuestos). 
    El SGI no realiza la gestión de datos económicos derivados de las actividades de investigación (proyectos, contratos, grupos y propiedad industrial e intelectual) 
    sino que se precisa de una integración con el sistema de gestión económica (SGE). Fruto de esta integración se muestran una serie de datos en el SGI que permiten reflejar el estado económico de las actividades mencionadas. 
    Estos datos económicos recopilados del SGE corporativo no son almacenados en el SGI, por lo que no es posible realizar ningún tipo de cálculo que permita obtener resultados adicionales a los que puedan ser remitidos por el SGE a partir de los servicios de integración definidos.
    El SGI dispone de un interface de integración predefinido para poder recuperar del SGE la información necesaria. 
    En el caso  que existan limitaciones para que el SGE implemente este interface predefinido, se deberá desarrollar la capa intermedia de adaptación necesaria en el ESB del SGI
    Los puntos más importantes del SGI en los que se muestran datos procedentes de la integración económica son:
      - CSP - Ejecución económica. Existen otros apartados del módulo CSP donde también se requieren datos procedentes de la integración económica, a partir de los que se realiza la configuración necesaria para presentar la información en este apartado de Ejecución económica.
      - PII - Repartos (API SGE-PII)

  version: 0.1.0
  contact: {}

tags:
  - name: codigos-economicos-gastos
    description: Códigos económicos gastos
  - name: codigos-economicos-gastos-public
    description: Códigos económicos gastos (endpoints accesibles sin autentificación)
  - name: codigos-economicos-ingresos
    description: Códigos económicos ingresos
  - name: documentos
    description: Documentos
  - name: ejecucion-economica
    description: Ejecución económica
  - name: facturas-emitidas
    description: Facturas emitidas
  - name: facturas-previstas
    description: Facturas previstas
  - name: facturas-previstas-emitidas
    description: Facturas previstas emitidas
  - name: facturas-previstas-pendientes
    description: Facturas previstas pendientes de emitir
  - name: gastos
    description: Gastos
  - name: periodos-amortizacion
    description: Periodos de amortización
  - name: partidas-presupuestarias-gastos
    description: Partidas presupuestarias gastos
  - name: partidas-presupuestarias-gastos-public
    description: Partidas presupuestarias gastos (endpoints accesibles sin autentificación)
  - name: partidas-presupuestarias-ingresos
    description: Partidas presupuestarias ingresos
  - name: partidas-presupuestarias-ingresos-public
    description: Partidas presupuestarias ingresos (endpoints accesibles sin autentificación)
  - name: proyectos
    description: Grupo de servicios para establecer la relación entre los proyectos del SGI y los proyectos económicos/orgánicas/centros de coste/etc. del sistema de gestión económica
  - name: seguimiento-justificacion
    description: Servicios para el apartado seguimiento de justificación. Este apartado del SGI que puede ser deshabilitado sólo tiene sentido si la universidad dispone de una sistema o herramienta desde la que pueden agrupar los gastos de acuerdo a los periodos de justificación de los proyectos de investigación
  - name: solicitudes-proyecto
    description: Solicitudes de creación de proyecto económico/orgánica/centro de coste sobre el sistema de gestión económica

paths:
  /codigos-economicos-gastos:
    get:
      tags:
        - codigos-economicos-gastos
      summary: Lista de códigos económicos de tipo gasto
      description: |-
        Devuelve los códigos económicos de tipo gasto ordenados alfabéticamente de forma ascendente por el campo `nombre`. Con el término "código económico" se hace referencia a los tipos de gastos, códigos contables, números de cuenta, económicas, etc. que se utilicen en el sistema de gestión económico (SGE) para realizar el apunte de gastos, facturas o ingresos. El SGI hace uso del listado de códigos económicos del SGE para poder establecer la correspondencia con los conceptos de gastos definidos por la convocatoria. Establecer esta correspondencia es algo opcional. Hacerlo permitirá que en el apartado de Ejecución económica se muestren de forma agrupada, por los conceptos de gasto de la convocatoria, el listado de gastos y resto de operaciones contables. La correspondencia entre los conceptos de gasto de la convocatoria y los códigos económicos del SGE se puede definir en el apartado Elegibilidad de la convocatoria y/o del proyecto.
        
        ### Módulos del SGI donde se utiliza
        - CSP: **Convocatoria ➜ Elegibilidad ➜ Códigos económicos**, **Proyecto ➜ Elegibilidad ➜ Códigos económicos**, **Proyecto ➜ Presupuesto ➜ Anualidad ➜ Gastos ➜ Partida de gastos**

        ### Consideraciones para la implementación
        - Este servicio será necesario para la implantación del módulo CSP.
        - Se devolverán todos los códigos económicos de gastos con la siguiente información para cada uno de ellos:
          - Referencia (identificador).
          - Nombre del código económico (será la cadena numérica o alfanumérica que identifica al tipo de gasto en el SGE).
          - Fecha de inicio de validez (en el SGI se corresponde con el campo fecha de fin de la correspondencia con un concepto de gasto).
          - Fecha fin de validez (en el SGI se corresponde con el campo fecha de fin de la correspondencia con un concepto de gasto).
      operationId: findAllCodigosEconomicosGasto
      security:
        - bearerAuth: []
      responses:
        200:
          description: Devuelve la lista de códigos económicos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CodigoEconomicoGastoOutput"
        204:
          description: No hay códigos económicos.

  /codigos-economicos-gastos/{id}:
    get:
      tags:
        - codigos-economicos-gastos
      summary: Detalles del código económico de tipo gasto
      description: |-
        Devuelve la información detallada del código económico de gasto identificado por el parámetro `id`.

        ### Módulos del SGI donde se utiliza
        - CSP: **Convocatoria ➜ Elegibilidad ➜ Códigos económicos**, **Proyecto ➜ Elegibilidad ➜ Códigos económicos**, **Proyecto ➜ Presupuesto ➜ Anualidad ➜ Gastos**, **Proyecto ➜ Presupuesto ➜ Anualidad ➜ Gastos ➜ Partida de gastos**

        ### Consideraciones para la implementación
        - Este servicio se utiliza para mostrar información sobre un código económico de tipo gasto de acuerdo a su definición en el SGE.
      operationId: findCodigoEconomicoGastoById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Identificador único del código económico de gasto
          required: true
          schema:
            type: string
            example: CG1
      responses:
        200:
          description: Devuelve el código económico
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodigoEconomicoGastoOutput"
        404:
          description: Código económico no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"


  /public/codigos-economicos-gastos/{id}:
    get:
      tags:
        - codigos-economicos-gastos-public
      summary: Detalles del código económico de tipo gasto
      description: |-
        Versión pública del endpoint `GET /codigos-economicos-gastos/{id}`.

        Devuelve los mismos datos, pero **no requiere autenticación** desde el SGI.

        ### Módulos del SGI donde se utiliza
        - PUB: **Convocatoria ➜ Elegibilidad ➜ Códigos económicos**

        ### Consideraciones para la implementación
        - Si los sistemas corporativos requieren autenticación, esta puede gestionarse desde el ESB o desde la propia implementación de la integración.
      operationId: findPublicCodigoEconomicoGastoById
      parameters:
        - name: id
          in: path
          description: Identificador único del código económico de gasto
          required: true
          schema:
            type: string
            example: CG1
      responses:
        200:
          description: Devuelve el código económico
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodigoEconomicoGastoOutput"
        404:
          description: Código económico no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"


  /codigos-economicos-ingresos:
    get:
      tags:
        - codigos-economicos-ingresos
      summary: Lista de códigos económicos de tipo ingreso
      description: |-
        Devuelve los códigos económicos de tipo ingreso ordenados alfabéticamente de forma ascendente por el campo `nombre`. Con el término "código económico" se hace referencia a los tipos de gastos, códigos contables, números de cuenta, económicas, etc. que se utilicen en el sistema de gestión económico (SGE) para realizar el apunte de gastos, facturas o ingresos. El SGI hace uso del listado de códigos económicos del SGE para poder establecer la correspondencia con los conceptos de gastos definidos por la convocatoria. Establecer esta correspondencia es algo opcional. Hacerlo permitirá que en el apartado de Ejecución económica se muestren de forma agrupada, por los conceptos de gasto de la convocatoria, el listado de gastos y resto de operaciones contables. La correspondencia entre los conceptos de gasto de la convocatoria y los códigos económicos del SGE se puede definir en el apartado Elegibilidad de la convocatoria y/o del proyecto.
        
        ### Módulos del SGI donde se utiliza
        - CSP: **Proyecto ➜ Presupuesto ➜ Anualidad ➜ Ingresos ➜ Partida de gastos**

        ### Consideraciones para la implementación
        - Este servicio será necesario para la implantación del módulo CSP.
        - Se devolverán todos los códigos económicos de ingresos con la siguiente información para cada uno de ellos:
          - Referencia (identificador).
          - Nombre del código económico (será la cadena numérica o alfanumérica que identifica al tipo de ingreso en el SGE).
          - Fecha de inicio de validez (inicio de la vigencia del código en caso de que la tuviese).
          - Fecha fin de validez (fin de la vigencia del código en caso de que la tuviese).
      operationId: findAllCodigosEconomicosIngreso
      security:
        - bearerAuth: []
      responses:
        200:
          description: Devuelve la lista de códigos económicos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CodigoEconomicoIngresoOutput"
        204:
          description: No hay códigos económicos.
        400:
          description: Parametros no validos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"

  /codigos-economicos-ingresos/{id}:
    get:
      tags:
        - codigos-economicos-ingresos
      summary: Detalles del código económico de tipo ingreso
      description: |-
        Devuelve la información detallada del código económico de ingreso identificado por el parámetro `id`.

        ### Módulos del SGI donde se utiliza
        - CSP: **Proyecto ➜ Presupuesto ➜ Anualidad ➜ Ingresos**, **Proyecto ➜ Presupuesto ➜ Anualidad ➜ Ingresos ➜ Partida de gastos**

        ### Consideraciones para la implementación
        - Este servicio se utiliza para mostrar información sobre un código económico de tipo ingreso de acuerdo a su definición en el SGE.
      operationId: findCodigoEconomicoIngresoById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Identificador único del código económico de ingreso
          required: true
          schema:
            type: string
            example: CI1
      responses:
        200:
          description: Devuelve el código económico
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodigoEconomicoIngresoOutput"
        404:
          description: Código económico no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

  /documentos/{id}/archivo:
    get:
      tags:
        - documentos
      summary: Binario del documento
      description: |-
        Devuelve el binario del documento económico correspondiente al `id`.
        Este endpoint **solo devuelve el archivo**, no los metadatos del documento.

        El identificador del documento se obtiene a través del endpoint de detalle del dato económico: `GET /ejecucion-economica/{id}`. Dentro de la respuesta, en el campo `documentos`.

        ### Módulos del SGI donde se utiliza
        - CSP: **Ejecución económica ➜ Facturas y justificantes ➜ Facturas y gastos ➜ Detalle**, **Ejecución económica ➜ Facturas y justificantes ➜ Viajes y dietas ➜ Detalle**, **Ejecución económica ➜ Facturas y justificantes ➜ Personal contratado ➜ Detalle**, **Ejecución económica ➜ Clasificacion de gastos ➜ Detalle, **Ejecución económica ➜ Facturas emitidas ➜ Detalle

        ### Consideraciones para la implementación
        - El documento es dependiente de una operación económica (gasto).
        - En caso que el SGE no disponga de la posibilidad de implementar el servicio, el listado de documentos asociados al gasto se mostraría vacío.
      operationId: findDocumentoArchivoById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Identificador único del documento
          required: true
          schema:
            type: string
            example: D1
      responses:
        200:
          description: Devuelve el documento
          headers:
            Content-Disposition:
              description: Indica que la respuesta es un adjunto descargable
              schema:
                type: string
                example: attachment; filename="documento1.pdf"
            Content-Type:
              description: Tipo de contenido del archivo
              schema:
                type: string
                example: application/octet-stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        404:
          description: Documento no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

  /ejecucion-economica:
    get:
      tags:
        - ejecucion-economica
      summary: Devuelve la lista con los datos económicos pedidos según el campo tipoOperacion.
      description: |-
        Devuelve la lista de operaciones económicas filtradas y ordenadas.
        La búsqueda se realiza mediante una expresión en formato **RSQL** enviada en el parámetro `q`.
        Aunque el parámetro `q` no es obligatorio a nivel técnico, el campo `tipoOperacion` dentro del filtro es obligatorio.

        ### Búsquedas necesarias que deben soportarse
        - `proyectoId`
        - `anualidad`
        - `tipoOperacion` (obligatorio)
        - `reducida` (no filtra, solo afecta a columnas devueltas)
        - `fechaPago`
        - `fechaDevengo`
        - `fechaFactura`

        El **tipoOperacion** puede tomar los siguientes valores:
        - **EPA** (Ejecución presupestaria - Estado actual)
        - **EPG** (Ejecución presupestaria - Gastos)
        - **EPI** (Ejecución presupestaria - Ingresos)
        - **FJF** (Facturas y justificantes - Facturas y gastos)
        - **FJV** (Facturas y justificantes - Viajes y dietas)
        - **FJP** (Facturas y justificantes - Personal contratado)
        - **DOG** (Detalle de operaciones - Gastos)
        - **DOI** (Detalle de operaciones - Ingresos)
        - **DOM** (Detalle de operaciones - Modificaciones)

        El campo **reducida** puede tomar los siguientes valores:
        - `true`: sólo se envían las columnas a mostrar en la pantalla principal
        - `false`:  se envían todas las columnas (para su exportación)
        Si no se informa, se considera `false`.

        ### Módulos del SGI donde se utiliza
        - CSP: **Ejecución económica ➜ Ejecución presupuestaria ➜ Estado actual**, **Ejecución económica ➜ Ejecución presupuestaria ➜ Gastos**, **Ejecución económica ➜ Ejecución presupuestaria ➜ Ingresos**, **Ejecución económica ➜ Detalle operaciones ➜ Gastos**, **Ejecución económica ➜ Detalle operaciones ➜ Ingresos**, **Ejecución económica ➜ Detalle operaciones ➜ Modificaciones**, **Ejecución económica ➜ Facturas y justificantes ➜ Facturas y gastos**, **Ejecución económica ➜ Facturas y justificantes ➜ Viajes y dietas**, **Ejecución económica ➜ Facturas y justificantes ➜ Personal contratado**  

        ### Consideraciones para la implementación
        - La implementación de este servicio es **opcional**. En caso que el SGE no posibilite la implementación de este servicio se podría establecer una configuración en el SGI para deshabilitar el apartado de Ejecución Económica. Esto supondría que no se podría realizar el seguimiento de los datos económicos de proyectos y grupos desde el SGI. También se podrían deshabilitar apartados individuales de Ejecución Económica según la disponibilidad de los tipos de operación asociados.
      operationId: findAllEjecucionEconomica
      security:
        - bearerAuth: []
      x-sgi-return-page: true # Remplaza el List de la respuesta un Page
      parameters:
        - name: X-Page
          in: header
          description: Nº de pagina
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 1
        - name: X-Page-Size
          in: header
          description: Nº de elementos por página
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 5
        - name: q
          in: query
          required: true
          description: |-
            Criterios de busqueda en formato RSQL. 
            - `proyectoId`
            - `anualidad`
            - `tipoOperacion` (obligatorio)
            - `reducida` (no filtra, solo afecta a columnas devueltas)
            - `fechaPago`
            - `fechaDevengo`
            - `fechaFactura`
            - `fechaContabilizacion`
          type: string
          example: proyectoId==P1;tipoOperacion=="FJF";reducida==false
        - name: s
          x-sgi-pageable: true # Sustituye este parametro en un Pageable al que se le pasa este parametro como ordenación.
          in: query
          description: |-
            Criterios de ordenación. Formato: `campo,asc|desc`.
          schema:
            type: string
            example: anualidad,asc
    responses:
      200:
        description: Lista de datos económicos
        headers:
          X-Page-Count:
            description: Número total de páginas
            schema:
              type: integer
              example: 2
          X-Page-Total-Count:
            description: Número de elementos en la página actual
            schema:
              type: integer
              example: 5
          X-Total-Count:
            description: Número total de elementos
            schema:
              type: integer
              example: 12
          X-Page-Size:
            description: Tamaño de página
            schema:
              type: integer
              example: 5
          X-Page:
            description: Página actual
            schema:
              type: integer
              example: 0
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/DatoEconomicoOutput"
        204:
          description: No hay datos económicos para los criterios de busqueda utilizados.
        400:
          description: Parámetros no válidos (ej. sintaxis RSQL inválida o parámetros de paginación fuera de rango).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"

  /ejecucion-economica/columnas:
    get:
      tags:
        - ejecucion-economica
      summary: Devuelve la lista de columnas dinámicas de los datos económicos asociadas a un tipo de operación
      description: |-
        Devuelve la lista de columnas dinámicas configuradas para un determinado `tipoOperacion`.
        La selección de columnas se realiza exclusivamente en función del campo `tipoOperacion`.
        
        ### Búsquedas necesarias que deben soportarse
        - `tipoOperacion` (obligatorio)
          Ejemplo:
          tipoOperacion=="FJF"

        El **tipoOperacion** puede tomar los siguientes valores:
        - **EPA** (Ejecución presupestaria - Estado actual)
        - **EPG** (Ejecución presupestaria - Gastos)
        - **EPI** (Ejecución presupestaria - Ingresos)
        - **FJF** (Facturas y justificantes - Facturas y gastos)
        - **FJV** (Facturas y justificantes - Viajes y dietas)
        - **FJP** (Facturas y justificantes - Personal contratado)
        - **DOG** (Detalle de operaciones - Gastos)
        - **DOI** (Detalle de operaciones - Ingresos)
        - **DOM** (Detalle de operaciones - Modificaciones)

        ### Módulos del SGI donde se utiliza
        - CSP: **Ejecución económica ➜ Ejecución presupuestaria ➜ Estado actual**, **Ejecución económica ➜ Ejecución presupuestaria ➜ Gastos**, **Ejecución económica ➜ Ejecución presupuestaria ➜ Ingresos**, **Ejecución económica ➜ Detalle operaciones ➜ Gastos**, **Ejecución económica ➜ Detalle operaciones ➜ Ingresos**, **Ejecución económica ➜ Detalle operaciones ➜ Modificaciones**, **Ejecución económica ➜ Facturas y justificantes ➜ Facturas y gastos**, **Ejecución económica ➜ Facturas y justificantes ➜ Viajes y dietas**, **Ejecución económica ➜ Facturas y justificantes ➜ Personal contratado**  

        ### Consideraciones para la implementación
        - La implementación de este servicio es **opcional**. En caso que el SGE no posibilite la implementación de este servicio se podría establecer una configuración en el SGI para deshabilitar el apartado de Ejecución Económica. Esto supondría que no se podría realizar el seguimiento de los datos económicos de proyectos y grupos desde el SGI. También se podrían deshabilitar apartados individuales de Ejecución Económica según la disponibilidad de los tipos de operación asociados.
      operationId: findAllColumnasEjecucionEconomica
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: |-
            Criterios de búsqueda en formato RSQL. Es obligatorio incluir el campo:
            - `tipoOperacion` 
          schema:
            type: string
            example: tipoOperacion=="FJF"
      responses:
        200:
          description: Devuelve la lista de columnas asociadas al tipo de operación.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ColumnaOutput"
        204:
          description: No hay columnas para el tipo de operación indicado.
        400:
          description: Tipo de operación no válido o no informado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"

  /ejecucion-economica/{id}:
    get:
      tags:
        - ejecucion-economica
      summary: Devuelve el detalle de una operación económica.
      description: |-
        Devuelve el detalle de la operación económica correspondiente al `id`. El parámetro `tipoOperacion` es obligatorio y determina la estructura de los campos dinámicos devueltos. Si la operación económica tiene documentos asociados, se incluirán en el campo `documentos`.

        ### Valores permitidos para `tipoOperacion`
        - **EPA** (Ejecución presupuestaria - Estado actual)
        - **EPG** (Ejecución presupuestaria - Gastos)
        - **EPI** (Ejecución presupuestaria - Ingresos)
        - **FJF** (Facturas y justificantes - Facturas y gastos)
        - **FJV** (Facturas y justificantes - Viajes y dietas)
        - **FJP** (Facturas y justificantes - Personal contratado)
        - **DOG** (Detalle de operaciones - Gastos)
        - **DOI** (Detalle de operaciones - Ingresos)
        - **DOM** (Detalle de operaciones - Modificaciones)

        ### Módulos del SGI donde se utiliza
        - CSP: **Ejecución económica ➜ Ejecución presupuestaria ➜ Gastos ➜ Detalle**, **Ejecución económica ➜ Detalle operaciones ➜ Gastos ➜ Detalle**, **Ejecución económica ➜ Facturas y justificantes ➜ Facturas y gastos ➜ Detalle**, **Ejecución económica ➜ Facturas y justificantes ➜ Viajes y dietas ➜ Detalle**, **Ejecución económica ➜ Facturas y justificantes ➜ Personal contratado ➜ Detalle**, **Ejecución económica ➜ Facturas y justificantes ➜ Personal contratado ➜ Detalle**, **Ejecución económica ➜ Clasificación de gastos ➜ Detalle**, **Ejecución económica ➜ Facturas emitidas ➜ Detalle**

        ### Consideraciones para la implementación
        - La implementación de este servicio es **opcional**. En caso que el SGE no posibilite la implementación de este servicio se podría establecer una configuración en el SGI para deshabilitar el apartado de Ejecución Económica. Esto supondría que no se podría realizar el seguimiento de los datos económicos de proyectos y grupos desde el SGI. También se podrían deshabilitar apartados individuales de Ejecución Económica según la disponibilidad de los tipos de operación asociados.
        - Para los casos del `tipoOperacion`: **EPG** y **DOG** será necesario también que esté habilitada la vista de detalle.
      operationId: findEjecucionEconomicaById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: Identificador del dato económico
          required: true
          schema:
            type: string
            example: E1
        - name: tipoOperacion
          in: query
          description: Tipo de operación al que pertenece el dato económico
          required: true
          schema:
            type: string
            example: FJF
      responses:
        200:
          description: Devuelve el detalle del dato económico
          content:

      tags:
        - proyectos
      summary: Expone los datos para la creación de un nuevo proyecto económico/orgánica/centro de coste en el sistema de gestión económica
      description: |-
        Expone los datos para la creación de un nuevo proyecto económico/orgánica/centro de coste. Los datos se recogen a través del formly  definido de acuerdo a las necesidades particulares del sistema de gestión económica. El SGI admite que la creación del proyecto económico sea resuelta por el sistema de gestión económica de forma síncrona o asíncrona.

        ### Módulos del SGI donde se utiliza
        - CSP: **Proyecto ➜ Configuración económica ➜ Identificación**

        ### Consideraciones para la implementación
        - Este servicio se utiliza desde la acción **Solicitar alta** del buscador de proyectos si este está habilitado en la configuración o directamente desde **Añadir identificador SGE** en la pantalla anteriormente mencionada.
        - Su implementación es **obligatoria** para poder vincular un proyecto SGI a un identificador SGE lo que resulta indispensable para: definir el presupuesto de proyectos y para habilitar el apartado de Ejecución Económica
      operationId: createProyectoFormly
      security:
        - bearerAuth: []
      requestBody:
        description: Datos del proyecto
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProyectoFormlyCreateInput"
      responses:
        200:
          description: Devuelve el identificador del proyecto creado (creación síncrona).
          content:
            application/json:
              schema:
                type: string
                example: P2
        202:
          description: Solicitud de creación procesada correctamente (creación asíncrona).
        400:
          description: Datos del proyecto incorrectos o error en la validación.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
        401:
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        403:
          $ref: "#/components/responses/AccessDeniedErrorResponse"
  
  /proyectos/formly/create:
    get:
      tags:
        - proyectos
      summary: Formulario dinámico para la solicitud de los datos de creación de un proyecto económico/orgánica/centro de coste
      description: |-
        Devuelve la definición del formulario dinámico (**Formly**) a través del que se recogerán todos los datos que el sistema de gestión económica requiere para la creación de un nuevo  proyecto económico/orgánica/centro de coste.

        ### Módulos del SGI donde se utiliza
        - CSP: **Proyecto ➜ Configuración económica ➜ Identificación**

        ### Consideraciones para la implementación
        - Este servicio se utiliza desde la acción **Solicitar alta** del buscador de proyectos si este está habilitado en la configuración o directamente desde **Añadir identificador SGE** en la pantalla anteriormente mencionada.
        - Al construir el formulario, pueden incorporarse datos adicionales no expuestos directamente al SGI.
        - Si se requiere añadir **validadores personalizados**, es necesario **incluirlos previamente en el SGI** para que puedan ser reconocidos y utilizados en los formularios dinámicos.

        ### Validadores personalizados disponibles
        - `date-is-after`: Valida que la fecha del campo sea posterior a otra fecha o campo.  
        - `date-is-between`: Valida que la fecha esté entre dos valores o campos.  
        - `email`: Valida el formato de correo electrónico.  

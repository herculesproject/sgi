  /proyectos:
    get:
      tags:
        - proyectos
      summary: Devuelve una lista paginada y filtrada de proyectos económicos/orgánicas/centros de coste existentes en el sistema de gestión económica
      description: |-
        Devuelve una lista paginada de proyectos económicos/orgánicas/centros de coste aplicando criterios de búsqueda y ordenación. Este servicio del SGI se utilizará exclusivamente a través del componente de búsqueda de identificadores SGE.

        ### Módulos del SGI donde se utiliza
        - CSP: **Proyecto ➜ Configuración económica ➜ Identificación**

        ### Detalles del filtrado
        - El parámetro `q` utiliza sintaxis **RSQL** para aplicar filtros sobre los campos soportados.

        ### Consideraciones para la implementación
        - La implementación de este servicio es **opcional**.
        - Será necesaria únicamente cuando esté habilitada la configuración del buscador de proyectos SGE.
        - Aunque el soporte completo de búsquedas RSQL es opcional, **se recomienda implementarlo** para mantener la compatibilidad futura con el SGI.

        ### Búsquedas necesarias que deben soportarse
        - `id`
        - `titulo`
        - `fechaInicio`
        - `fechaFin`
      operationId: findAllProyectoss
      security:
        - bearerAuth: []
      x-sgi-return-page: true # Remplaza el List de la respuesta un Page
      parameters:
        - name: X-Page
          in: header
          description: Nº de pagina
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 1
        - name: X-Page-Size
          in: header
          description: Nº de elementos por página
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 5
        - name: q
          in: query
          required: true
          description: |-
            Criterios de busqueda en formato RSQL. Se puede buscar por los siguientes campos:
            - id
            - titulo
            - fechaInicio
            - fechaFin
          schema:
            type: string
            example: titulo=ik=proy,fechaInicio=ge=2020-03-07T00:00:00Z
        - name: s
          x-sgi-pageable: true # Sustituye este parametro en un Pageable al que se le pasa este parametro como ordenación.
          in: query
          description: |-
            Criterios de ordenación. Formato: `campo,asc|desc`.
          schema:
            type: string
            example: titulo,asc
      responses:
        200:
          description: Devuelve la lista paginada de proyectos
          headers:
            X-Page-Count:
              description: Nº de páginas
              schema:
                type: integer
                example: 2
            X-Page-Total-Count:
              description: Nº de elementos en la página actual
              schema:
                type: integer
                example: 1
            X-Total-Count:
              description: Nº total de elementos que cumplen los criterios
              schema:
                type: integer
                example: 6
            X-Page-Size:
              description: Nº de elementos por página
              schema:
                type: integer
                example: 5
            X-Page:
              description: Nº de página devuelta
              schema:
                type: integer
                example: 1
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProyectoOutput"
        204:
          description: No hay proyectos para los criterios de busqueda utilizados.
        400:
          description: Datos del periodo de amortización no válidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"

  /proyectos/{id}:

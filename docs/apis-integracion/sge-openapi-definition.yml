    AccessDeniedError:
      type: object
      description: Este error se produce cuando el usuario no tiene permiso para acceder al recurso solicitado.
      required:
        - type
        - title
        - status
        - instance
      properties:
        type:
          type: string
          description: Tipo de error.
          example: urn:problem-type:access-denied
        title:
          type: string
          description: Descripción del error.
          example: Forbidden
        status:
          type: integer
          description: Código HTTP del error.
          example: 403
        instance:
          type: string
          description: Identificador único del error.
          example: urn:uuid:6ec423fd-87fb-4470-9c5e-60c4628bd7eb
        detail:
          type: string
          description: Información adicional del error.
          example: Access is denied
    NotFoundError:
      type: object
      description: Este error se produce cuando el recurso solicitado no existe.
      required:
        - type
        - title
        - status
        - instance
      properties:
        type:
          type: string
          description: Tipo de error.
          example: urn:problem-type:not-found
        title:
          type: string
          description: Descripción del error.
          example: Not Found
        status:
          type: integer
          description: Código HTTP del error.
          example: 404
        instance:
          type: string
          description: Identificador único del error.
          example: urn:uuid:6ec423fd-87fb-4470-9c5e-60c4628bd7eb
        detail:
          type: string
          description: Información adicional del error.
          example: No se ha encontrado '{NOMBRE_RECURSO}' con el identificador '{IDENTIFICADOR_RECURSO}'
    UnauthorizedError:
      type: object
      description: Este error se produce cuando el usuario no está autenticado (Token JWT inválido, expirado o ausente).
      required:
        - type
        - title
        - status
        - instance
      properties:
        type:
          type: string
          description: Tipo de error.
          example: urn:problem-type:authentication
        title:
          type: string
          description: Descripción del error.
          example: Unauthorized
        status:
          type: integer
          description: Código HTTP del error.
          example: 401
        instance:
          type: string
          description: Identificador único del error.
          example: urn:uuid:6ec423fd-87fb-4470-9c5e-60c4628bd7eb
        detail:
          type: string
          description: Información adicional del error.
          example: No token found
    BadRequestError:
      type: object
      description: Este error se produce cuando el sistema recibe una petición incorrecta y no existe un error más especifico.
      required:
        - type
        - title
        - status
        - instance
      properties:
        type:
          type: string
          description: Tipo de error.
          example: urn:problem-type:bad-request
        title:
          type: string
          description: Descripción del error.
          example: Bad Request
        status:
          type: integer
          description: Código HTTP del error.
          example: 400
        instance:
          type: string
          description: Identificador único del error.
          example: urn:uuid:6ec423fd-87fb-4470-9c5e-60c4628bd7eb
        detail:
          type: string
          description: Información adicional del error.
          example: Page index must not be less than zero
  responses:
    UnauthorizedErrorResponse:
      description: Token JWT inválido, expirado o ausente
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UnauthorizedError"
    AccessDeniedErrorResponse:
      description: El usuario no tiene permiso para acceder al recurso solicitado.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AccessDeniedError"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT # optional, for documentation purposes only

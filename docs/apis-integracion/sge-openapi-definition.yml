  /solicitudes-proyecto/{proyectoSgiId}/pendientes:
    get:
      tags:
        - solicitudes-proyecto
      summary: |-
        Lista de solicitudes asociadas al proyecto con el proyectoSgiId con un estado pendiente de procesar
      description: |-
        Listado de solicitudes de creación de proyecto económico/orgánica/centro que aún están pendientes de procesar por el sistema de gestión económica.

        El resultado se utiliza para:
        - Informar en el SGI de la existencia de solicitudes de creación de proyecto económico/orgánica/centro que están pendientes de resolver por el sistema de gestión económica.
        - Informar en el SGI de la existencia de solicitudes de modificación de los datos de proyecto económico/orgánica/centro o de vinculaciones de proyecto económico/orgánica/centro con proyectos SGI que están pendientes de resolver por el sistema de gestión económica.

        ### Módulos del SGI donde se utiliza
        - CSP ➜ **Proyectos ➜ Configuración económica ➜ Identificación**

        ### Consideraciones para la implementación
        - La implementación de este servicio es **opcional**.
        - Solo es necesaria cuando las operaciones de **alta o modificación de proyectos en el SGE** se ejecutan en **modo asíncrono**.
        - El servicio devuelve las solicitudes asociadas al proyecto que aún no han sido completamente resueltas en el sistema económico.
      operationId: findAllSolicitudesProyectoPendientesByProyectoSgiId
      security:
        - bearerAuth: []
      parameters:
        - name: proyectoSgiId

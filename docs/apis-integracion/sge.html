<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SGE API</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css" />
</head>

<body>
  <div id="swagger-sge"></div>
  <hr>
  <div id="swagger-sgepii"></div>

  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
  <script>
    window.onload = () => {
      SwaggerUIBundle({
        url: "./sge-openapi-definition.yml",
        dom_id: "#swagger-sge",
      });
      SwaggerUIBundle({
        url: "./sgepii-openapi-definition.yml",
        dom_id: "#swagger-sgepii",
      });
    };
  </script>
</body>
</html>

<sgi-fragment title="{{'csp.grupo-relacion-institucional' | translate:MSG_PARAMS.CARDINALIRY.PLURAL}}">

  <div class="mat-elevation-z4">
    <table mat-table [dataSource]="dataSource" matSort matSortActive="nombreEntidad" matSortDirection="asc"
      matSortDisableClear>

      <!-- Nombre entidad Column -->
      <ng-container matColumnDef="nombreEntidad">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          {{'csp.grupo-relacion-institucional.nombre-entidad' | translate}}
        </th>
        <td mat-cell *matCellDef="let wrapper">
          {{ wrapper.value.entidad?.nombre || wrapper.value.institucion }}
        </td>
      </ng-container>

      <!-- Acciones Column -->
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef> {{'label.actions' | translate}} </th>
        <td mat-cell *matCellDef="let relacion">
          <ng-container *ngIf="!formPart.readonly">
            <button mat-icon-button color="primary" matTooltip="{{'btn.edit' | translate}}"
              (click)="openModal(relacion)">
              <mat-icon>border_color</mat-icon>
            </button>
            <button mat-icon-button color="warn" matTooltip="{{'btn.delete' | translate}}"
              (click)="deleteRelacion(relacion)">
              <mat-icon>highlight_off</mat-icon>
            </button>
          </ng-container>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

    <mat-paginator [pageSizeOptions]="elementosPagina" showFirstLastButtons>
    </mat-paginator>
  </div>
  <ng-container *ngIf="!formPart.readonly">
    <div class="separation-button">
      <button color="three" mat-button mat-raised-button (click)="openModal()">
        <mat-icon color="accent">add_circle</mat-icon>
        {{ 'btn.add.entity' | translate:msgParamEntity }}
      </button>
    </div>
  </ng-container>
</sgi-fragment>

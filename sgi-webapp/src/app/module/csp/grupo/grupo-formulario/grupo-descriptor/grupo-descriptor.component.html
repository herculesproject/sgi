<sgi-fragment title="{{'csp.grupo-descriptor' | translate:MSG_PARAMS.CARDINALIRY.PLURAL}}">

  <div class="mat-elevation-z4">
    <table mat-table [dataSource]="dataSource" matSort matSortActive="tipoDescriptorGrupo" matSortDirection="asc"
      matSortDisableClear>

      <!-- Tipo descriptor Column -->
      <ng-container matColumnDef="tipoDescriptorGrupo">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          {{'csp.grupo-descriptor.tipo-descriptor-grupo' | translate}}
        </th>
        <td mat-cell *matCellDef="let wrapper">
          <sgi-i18n-table-field [field]="wrapper.value.tipoDescriptorGrupo?.nombre"></sgi-i18n-table-field>
        </td>
      </ng-container>

      <!-- Descripcion Column -->
      <ng-container matColumnDef="texto">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> {{'csp.grupo-descriptor.texto' | translate}}
        </th>
        <td mat-cell *matCellDef="let wrapper" [matTooltip]="wrapper.value.texto | i18nFieldTooltip"
          matTooltipClass="sgi-tooltip-40vw">
          {{wrapper.value.texto | i18nFieldValue}}
        </td>
      </ng-container>

      <!-- Acciones Column -->
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef> {{'label.actions' | translate}} </th>
        <td mat-cell *matCellDef="let descriptor">
          <ng-container *ngIf="!formPart.readonly">
            <button mat-icon-button color="primary" matTooltip="{{'btn.edit' | translate}}"
              (click)="openModal(descriptor)">
              <mat-icon>border_color</mat-icon>
            </button>
            <button mat-icon-button color="warn" matTooltip="{{'btn.delete' | translate}}"
              (click)="deleteDescriptor(descriptor)">
              <mat-icon>highlight_off</mat-icon>
            </button>
          </ng-container>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

    <mat-paginator [pageSizeOptions]="elementosPagina" showFirstLastButtons>
    </mat-paginator>
  </div>
  <ng-container *ngIf="!formPart.readonly">
    <div class="separation-button">
      <button color="three" mat-button mat-raised-button (click)="openModal()">
        <mat-icon color="accent">add_circle</mat-icon>
        {{ 'btn.add.entity' | translate:msgParamEntity }}
      </button>
    </div>
  </ng-container>
</sgi-fragment>

<sgi-fragment title="{{'csp.proyecto-unidad-vinculacion' | translate:MSG_PARAMS.CARDINALIRY.PLURAL}}">

  <div class="mat-elevation-z4">
    <table mat-table [dataSource]="dataSource" matSort matSortActive="tipoUnidad" matSortDirection="asc"
      matSortDisableClear>

      <!-- Tipo unidad Column -->
      <ng-container matColumnDef="tipoUnidad">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          {{'csp.proyecto-unidad-vinculacion.tipo-unidad' | translate}}
        </th>
        <td mat-cell *matCellDef="let wrapper">{{wrapper.value.tipoUnidad?.nombre}}</td>
      </ng-container>

      <!-- Unidad vinculada Column -->
      <ng-container matColumnDef="unidadVinculacion">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          {{'csp.proyecto-unidad-vinculacion.unidad' | translate}}
        </th>
        <td mat-cell *matCellDef="let wrapper">{{wrapper.value.unidadVinculacion?.nombre}}</td>
      </ng-container>

      <!-- Acciones Column -->
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>{{'label.actions' | translate}}</th>
        <td mat-cell *matCellDef="let unidad">
          <ng-container *ngIf="!formPart.readonly">
            <button mat-icon-button color="warn" matTooltip="{{'btn.delete' | translate}}"
              (click)="deleteUnidadVinculacion(unidad)">
              <mat-icon>highlight_off</mat-icon>
            </button>
          </ng-container>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="elementosPagina" showFirstLastButtons></mat-paginator>
  </div>

  <ng-container *ngIf="!formPart.readonly">
    <div class="separation-button">
      <button color="three" mat-button mat-raised-button (click)="openModal()">
        <mat-icon color="accent">add_circle</mat-icon>
        {{ 'btn.add.entity' | translate:msgParamEntity }}
      </button>
    </div>
  </ng-container>
</sgi-fragment>
